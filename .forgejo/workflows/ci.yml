# SPDX-License-Identifier: MPL-2.0
# EN: CI pipeline for glintfx on Codeberg (Forgejo Actions) -- builds the library and
#     runs both test suites under Xvfb / Mesa llvmpipe via a 2-config matrix, PLUS a
#     parallel `lint-and-scan` job with 3 CI-now, sempre-verde gates (TESTES.md
#     "Camada 1", TODO.md LW-TST): TST-L1-STATIC (clang-tidy + cppcheck + the
#     tools/check_encapsulation.sh third-party-leak gate), TST-L1-SECRETS (gitleaks,
#     history + working tree), TST-L1-DEPS (grype dir scan). See job comments below
#     for tool choice rationale and the exact severity thresholds.
#       GLFW=ON  -- 18 tests: window_smoke render_smoke engine_smoke app_smoke
#                   app_dp_ratio_smoke render_sanity data_model_smoke data_model_scalar
#                   data_model_list texture_png_alpha (10 GLFW-only) + ui_layer_attach
#                   compose gl_state_guard events sanity dp_ratio_sanity base_url_sanity
#                   ua_stylesheet_sanity (8 embed)
#       GLFW=OFF --  8 embed tests: ui_layer_attach compose gl_state_guard events sanity
#                   dp_ratio_sanity base_url_sanity ua_stylesheet_sanity
#     Triggers on every push or PR that modifies glintfx/ or this workflow file.
#
#     Runner note: codeberg-medium (4 CPU / 8 GB / 10 min) is the active global
#     runner as of 2026-06-13. Runner state oscillates -- reconfirm at
#     codeberg.org/actions/meta before the first push. If a job sits in `waiting`
#     for minutes, that is queue congestion (not a YAML error) -- wait, or switch
#     to codeberg-medium-lazy (up to 24 h window).
#
#     Container: ghcr.io/catthehacker/ubuntu:act-latest is the current Codeberg
#     default (compat nektos/act + GitHub Actions). Codeberg global runners do NOT
#     have language stacks pre-installed -- all deps are installed in `install deps`.
#
# PT: Pipeline de CI para glintfx no Codeberg (Forgejo Actions) -- builda a biblioteca e
#     roda ambas as suites sob Xvfb / Mesa llvmpipe via matrix de 2 configs:
#       GLFW=ON  -- 18 testes: window_smoke render_smoke engine_smoke app_smoke
#                   app_dp_ratio_smoke render_sanity data_model_smoke data_model_scalar
#                   data_model_list texture_png_alpha (10 so-GLFW) + ui_layer_attach
#                   compose gl_state_guard events sanity dp_ratio_sanity base_url_sanity
#                   ua_stylesheet_sanity (8 embed)
#       GLFW=OFF --  8 testes embed: ui_layer_attach compose gl_state_guard events sanity
#                   dp_ratio_sanity base_url_sanity ua_stylesheet_sanity
#     Disparado em todo push ou PR que modifica glintfx/ ou este workflow.
#
#     Nota de runner: codeberg-medium (4 CPU / 8 GB / 10 min) e o runner global ativo
#     em 2026-06-13. Estado oscila -- reconfirmar em codeberg.org/actions/meta antes do
#     1o push. Job em `waiting` por minutos = fila (nao erro de YAML) -- esperar ou
#     trocar para codeberg-medium-lazy (janela de ate 24 h).
#
#     Container: ghcr.io/catthehacker/ubuntu:act-latest e o default atual do Codeberg.
#     Runners globais NAO tem stacks pre-instaladas -- todas as deps sao instaladas em
#     `install deps`.
name: ci

on:
  push:
    paths:
      - "glintfx/**"
      - ".forgejo/workflows/ci.yml"
  pull_request:
    paths:
      - "glintfx/**"
      - ".forgejo/workflows/ci.yml"

# EN: Cancel in-progress runs on the same ref to spare the shared runner pool.
# PT: Cancela runs em andamento no mesmo ref para nao ocupar o pool compartilhado.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (codeberg-medium / GLFW=${{ matrix.backend }})
    # EN: codeberg-medium: 4 CPU / 8 GB / 10 min -- the stable global runner.
    #     Do NOT use 'ubuntu-latest' (GitHub label) or 'docker' (claudio, offline).
    # PT: codeberg-medium: 4 CPU / 8 GB / 10 min -- runner global estavel.
    #     NAO usar 'ubuntu-latest' (label GitHub) nem 'docker' (claudio, offline).
    runs-on: codeberg-medium
    container:
      # EN: act-latest: Codeberg official default, compat actions/setup-* and nektos/act.
      #     node:*-bookworm BREAKS actions/setup-python (codeberg/community#1718).
      # PT: act-latest: default oficial do Codeberg, compat actions/setup-* e nektos/act.
      #     node:*-bookworm QUEBRA actions/setup-python (codeberg/community#1718).
      image: ghcr.io/catthehacker/ubuntu:act-latest
    strategy:
      # EN: Run both configs even if one fails -- independent build configurations.
      # PT: Rodar ambas mesmo se uma falhar -- configuracoes de build independentes.
      fail-fast: false
      matrix:
        # EN: ON  = full build (App + UiLayer + GLFW backend); runs 18 tests.
        #     OFF = embed-only (UiLayer only, no GLFW in lib); runs 8 embed tests.
        #           GLFW is still needed as a test-only dep (GL context fixture).
        # PT: ON  = build completo (App + UiLayer + backend GLFW); roda 18 testes.
        #     OFF = embed-only (so UiLayer, sem GLFW na lib); roda 8 testes embed.
        #           GLFW ainda e necessario como dep so-de-teste (fixture de contexto GL).
        backend: [ON, OFF]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # EN: Cache the FetchContent clone of RmlUi. Each config uses its own build dir
      #     (build-ON / build-OFF) so cache paths and keys are separate per backend.
      # PT: Cache do clone FetchContent do RmlUi. Cada config usa seu proprio build dir
      #     (build-ON / build-OFF) por isso paths e chaves de cache sao separados.
      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build-${{ matrix.backend }}/_deps
          key: rmlui-${{ runner.os }}-glfw${{ matrix.backend }}-${{ hashFiles('glintfx/CMakeLists.txt') }}

      # EN: Install all build and runtime deps. The container (act-latest) ships
      #     git, curl, and build-essential, but NOT the graphics/GL stacks.
      #     Commands run as root inside the container -- no sudo needed.
      #     - git: required by CMake FetchContent to clone RmlUi.
      #     - libglfw3-dev: installed for BOTH configs -- in GLFW=OFF mode the embed
      #       tests use a hidden GLFW window as a test-only GL context fixture.
      #     - libgl1-mesa-dev / libegl1-mesa-dev: OpenGL + EGL headers (FindOpenGL).
      #     - libxkbcommon-dev: GLFW XKB keyboard-layout header.
      #     - libgl1-mesa-dri: llvmpipe -- Mesa software GL renderer (Xvfb GL backend).
      #     - xvfb: virtual X display + xvfb-run used by tests/run_xvfb.cmake.
      # PT: Instala todas as deps de build e runtime. O container (act-latest) inclui
      #     git, curl e build-essential, mas NAO as stacks de GL/graficos.
      #     Comandos rodam como root dentro do container -- sem sudo necessario.
      #     - git: necessario para FetchContent clonar o RmlUi.
      #     - libglfw3-dev: instalado em AMBAS as configs -- no modo GLFW=OFF os testes
      #       embed usam janela GLFW oculta como fixture de contexto GL so-de-teste.
      #     - libgl1-mesa-dev / libegl1-mesa-dev: headers OpenGL + EGL (FindOpenGL).
      #     - libxkbcommon-dev: header XKB do GLFW para layout de teclado.
      #     - libgl1-mesa-dri: llvmpipe -- renderer software GL do Mesa (backend GL Xvfb).
      #     - xvfb: display virtual X + xvfb-run usado por tests/run_xvfb.cmake.
      - name: install deps
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends \
            cmake g++ git \
            libglfw3-dev libfreetype-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            libgl1-mesa-dri \
            xvfb

      # EN: Configure with the matrix backend flag. Demos OFF -- showcase requires App/GLFW.
      # PT: Configura com a flag de backend da matrix. Demos OFF -- showcase requer App/GLFW.
      - name: configure
        run: |
          cmake -S glintfx -B glintfx/build-${{ matrix.backend }} \
            -DGLINTFX_BUILD_TESTS=ON \
            -DGLINTFX_BUILD_DEMOS=OFF \
            -DGLINTFX_BACKEND_GLFW=${{ matrix.backend }}

      - name: build
        run: cmake --build glintfx/build-${{ matrix.backend }} -j$(nproc)

      # EN: Run the test suite for this config under Xvfb (Mesa llvmpipe).
      #     GLFW=ON  runs 18 tests (10 GLFW-backend + 8 embed).
      #     GLFW=OFF runs  8 tests (8 embed only; GLFW/App tests excluded by CMake).
      #     run_xvfb.cmake calls xvfb-run -a per test; outer -a sets DISPLAY for ctest.
      # PT: Roda a suite de testes para esta config sob Xvfb (Mesa llvmpipe).
      #     GLFW=ON  roda 18 testes (10 backend GLFW + 8 embed).
      #     GLFW=OFF roda  8 testes (8 embed apenas; testes GLFW/App excluidos pelo CMake).
      #     run_xvfb.cmake chama xvfb-run -a por teste; o -a externo define DISPLAY para o ctest.
      - name: test
        run: xvfb-run -a ctest --test-dir glintfx/build-${{ matrix.backend }} --output-on-failure

  # EN: lint-and-scan -- 3 CI-now, sempre-verde gates (TESTES.md "Camada 1", TODO.md
  #     LW-TST). Independent of build-and-test (no matrix, no ctest); runs in parallel.
  #     Mirrors .github/workflows/ci.yml lint-and-scan job step-for-step so both
  #     remotes have equivalent coverage -- see that file for the full tool-choice
  #     rationale (clang-tidy+cppcheck / gitleaks / grype, pinned-tarball installs,
  #     --fail-on high, the grype coverage caveat for vendored C++ headers).
  # PT: lint-and-scan -- 3 gates CI-now, sempre-verde (TESTES.md "Camada 1", TODO.md
  #     LW-TST). Independente do build-and-test (sem matrix, sem ctest); roda em
  #     paralelo. Espelha o job lint-and-scan de .github/workflows/ci.yml passo a
  #     passo para os 2 remotos terem cobertura equivalente -- ver aquele arquivo para
  #     a justificativa completa de escolha de ferramenta (clang-tidy+cppcheck /
  #     gitleaks / grype, instalacao via tarball fixado, --fail-on high, a ressalva de
  #     cobertura do grype para headers C++ vendorizados).
  lint-and-scan:
    name: lint & scan (codeberg-medium)
    runs-on: codeberg-medium
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    env:
      GITLEAKS_VERSION: "8.30.0"
      GRYPE_VERSION: "0.112.0"
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # EN: full history for gitleaks. PT: historico completo para o gitleaks.

      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build-lint/_deps
          key: rmlui-${{ runner.os }}-lint-${{ hashFiles('glintfx/CMakeLists.txt') }}

      - name: install deps
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends \
            cmake g++ git clang-tidy cppcheck curl \
            libglfw3-dev libfreetype-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            libgl1-mesa-dri

      # EN: Configure-only (no `cmake --build`) -- see the equivalent step in
      #     .github/workflows/ci.yml for why this is enough for clang-tidy/cppcheck.
      # PT: So configure (sem `cmake --build`) -- ver o passo equivalente em
      #     .github/workflows/ci.yml para o motivo disso ser suficiente pro
      #     clang-tidy/cppcheck.
      - name: configure (compile_commands.json only)
        run: |
          cmake -S glintfx -B glintfx/build-lint \
            -DGLINTFX_BUILD_TESTS=ON \
            -DGLINTFX_BUILD_DEMOS=OFF \
            -DGLINTFX_BACKEND_GLFW=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # EN: TST-L1-STATIC (1/3) -- encapsulation gate.
      # PT: TST-L1-STATIC (1/3) -- gate de encapsulamento.
      - name: TST-L1-STATIC -- encapsulation gate
        run: ./tools/check_encapsulation.sh glintfx/include/glintfx

      # EN: TST-L1-STATIC (2/3) -- clang-tidy (checks + WarningsAsErrors policy in
      #     glintfx/.clang-tidy).
      # PT: TST-L1-STATIC (2/3) -- clang-tidy (checks + politica de WarningsAsErrors em
      #     glintfx/.clang-tidy).
      - name: TST-L1-STATIC -- clang-tidy
        run: clang-tidy -p glintfx/build-lint glintfx/src/*.cpp

      # EN: TST-L1-STATIC (3/3) -- cppcheck, restricted to our own src/, vendored/
      #     fetched code suppressed. --file-filter is '*glintfx/src/*' (leading bare
      #     '*', NOT '*/glintfx/src/*'): with a RELATIVE --project path (as used here),
      #     cppcheck 2.13 (this container's apt version) matches file entries as plain
      #     relative paths with no leading '/' (e.g. "glintfx/src/foo.cpp"), so a filter
      #     requiring a literal '/' right before "glintfx" never matches and cppcheck
      #     exits with "could not find any files matching the filter" -- reproduced and
      #     confirmed locally against both cppcheck 2.13 (container) and 2.21 (host).
      # PT: TST-L1-STATIC (3/3) -- cppcheck, restrito ao nosso proprio src/, codigo
      #     vendorizado/fetchado suprimido. --file-filter e '*glintfx/src/*' (asterisco
      #     nu no inicio, NAO '*/glintfx/src/*'): com --project RELATIVO (como aqui), o
      #     cppcheck 2.13 (versao apt deste container) casa as entradas de arquivo como
      #     caminho relativo puro sem '/' no inicio (ex.: "glintfx/src/foo.cpp"), entao
      #     um filtro que exige um '/' literal antes de "glintfx" nunca casa e o
      #     cppcheck sai com "could not find any files matching the filter" --
      #     reproduzido e confirmado localmente contra cppcheck 2.13 (container) e 2.21
      #     (host).
      - name: TST-L1-STATIC -- cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --std=c++20 --language=c++ --platform=unix64 \
            --project=glintfx/build-lint/compile_commands.json \
            --file-filter='*glintfx/src/*' \
            --suppress=missingIncludeSystem \
            --suppress='*:*/third_party/*' \
            --suppress='*:*/_deps/*' \
            --error-exitcode=1

      # EN: Installed into $HOME/.local/bin (added to PATH via GITHUB_PATH) -- same
      #     approach as the GitHub workflow, works unmodified whether the container
      #     runs as root (Forgejo/act-latest) or as a regular user.
      # PT: Instalado em $HOME/.local/bin (adicionado ao PATH via GITHUB_PATH) -- mesma
      #     abordagem do workflow GitHub, funciona sem alteracao rodando como root
      #     (Forgejo/act-latest) ou como usuario comum.
      - name: install gitleaks
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C "$HOME/.local/bin" gitleaks
          "$HOME/.local/bin/gitleaks" version

      # EN: TST-L1-SECRETS -- history + working tree.
      # PT: TST-L1-SECRETS -- historico + working tree.
      - name: TST-L1-SECRETS -- gitleaks
        run: gitleaks detect --source . --redact -v

      - name: install grype
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -sSfL -o /tmp/grype.tar.gz \
            "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/grype.tar.gz -C "$HOME/.local/bin" grype
          "$HOME/.local/bin/grype" version

      # EN: TST-L1-DEPS -- repo-tree scan, --fail-on high (actionable-alert threshold).
      # PT: TST-L1-DEPS -- scan da arvore do repo, --fail-on high (limiar de alerta
      #     acionavel).
      - name: TST-L1-DEPS -- grype
        run: grype dir:. --fail-on high
