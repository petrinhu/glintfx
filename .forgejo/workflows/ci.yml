# SPDX-License-Identifier: MPL-2.0
# EN: CI pipeline for glintfx on Codeberg (Forgejo Actions) -- builds the library and
#     runs both test suites under Xvfb / Mesa llvmpipe via a 2-config matrix:
#       GLFW=ON  -- 10 tests: window_smoke render_smoke engine_smoke app_smoke
#                   render_sanity + ui_layer_attach compose gl_state_guard events sanity
#       GLFW=OFF --  5 embed tests: ui_layer_attach compose gl_state_guard events sanity
#     Triggers on every push or PR that modifies glintfx/ or this workflow file.
#
#     Runner note: codeberg-medium (4 CPU / 8 GB / 10 min) is the active global
#     runner as of 2026-06-13. Runner state oscillates -- reconfirm at
#     codeberg.org/actions/meta before the first push. If a job sits in `waiting`
#     for minutes, that is queue congestion (not a YAML error) -- wait, or switch
#     to codeberg-medium-lazy (up to 24 h window).
#
#     Container: ghcr.io/catthehacker/ubuntu:act-latest is the current Codeberg
#     default (compat nektos/act + GitHub Actions). Codeberg global runners do NOT
#     have language stacks pre-installed -- all deps are installed in `install deps`.
#
# PT: Pipeline de CI para glintfx no Codeberg (Forgejo Actions) -- builda a biblioteca e
#     roda ambas as suites sob Xvfb / Mesa llvmpipe via matrix de 2 configs:
#       GLFW=ON  -- 10 testes: window_smoke render_smoke engine_smoke app_smoke
#                   render_sanity + ui_layer_attach compose gl_state_guard events sanity
#       GLFW=OFF --  5 testes embed: ui_layer_attach compose gl_state_guard events sanity
#     Disparado em todo push ou PR que modifica glintfx/ ou este workflow.
#
#     Nota de runner: codeberg-medium (4 CPU / 8 GB / 10 min) e o runner global ativo
#     em 2026-06-13. Estado oscila -- reconfirmar em codeberg.org/actions/meta antes do
#     1o push. Job em `waiting` por minutos = fila (nao erro de YAML) -- esperar ou
#     trocar para codeberg-medium-lazy (janela de ate 24 h).
#
#     Container: ghcr.io/catthehacker/ubuntu:act-latest e o default atual do Codeberg.
#     Runners globais NAO tem stacks pre-instaladas -- todas as deps sao instaladas em
#     `install deps`.
name: ci

on:
  push:
    paths:
      - "glintfx/**"
      - ".forgejo/workflows/ci.yml"
  pull_request:
    paths:
      - "glintfx/**"
      - ".forgejo/workflows/ci.yml"

# EN: Cancel in-progress runs on the same ref to spare the shared runner pool.
# PT: Cancela runs em andamento no mesmo ref para nao ocupar o pool compartilhado.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (codeberg-medium / GLFW=${{ matrix.backend }})
    # EN: codeberg-medium: 4 CPU / 8 GB / 10 min -- the stable global runner.
    #     Do NOT use 'ubuntu-latest' (GitHub label) or 'docker' (claudio, offline).
    # PT: codeberg-medium: 4 CPU / 8 GB / 10 min -- runner global estavel.
    #     NAO usar 'ubuntu-latest' (label GitHub) nem 'docker' (claudio, offline).
    runs-on: codeberg-medium
    container:
      # EN: act-latest: Codeberg official default, compat actions/setup-* and nektos/act.
      #     node:*-bookworm BREAKS actions/setup-python (codeberg/community#1718).
      # PT: act-latest: default oficial do Codeberg, compat actions/setup-* e nektos/act.
      #     node:*-bookworm QUEBRA actions/setup-python (codeberg/community#1718).
      image: ghcr.io/catthehacker/ubuntu:act-latest
    strategy:
      # EN: Run both configs even if one fails -- independent build configurations.
      # PT: Rodar ambas mesmo se uma falhar -- configuracoes de build independentes.
      fail-fast: false
      matrix:
        # EN: ON  = full build (App + UiLayer + GLFW backend); runs 10 tests.
        #     OFF = embed-only (UiLayer only, no GLFW in lib); runs 5 embed tests.
        #           GLFW is still needed as a test-only dep (GL context fixture).
        # PT: ON  = build completo (App + UiLayer + backend GLFW); roda 10 testes.
        #     OFF = embed-only (so UiLayer, sem GLFW na lib); roda 5 testes embed.
        #           GLFW ainda e necessario como dep so-de-teste (fixture de contexto GL).
        backend: [ON, OFF]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # EN: Cache the FetchContent clone of RmlUi. Each config uses its own build dir
      #     (build-ON / build-OFF) so cache paths and keys are separate per backend.
      # PT: Cache do clone FetchContent do RmlUi. Cada config usa seu proprio build dir
      #     (build-ON / build-OFF) por isso paths e chaves de cache sao separados.
      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build-${{ matrix.backend }}/_deps
          key: rmlui-${{ runner.os }}-glfw${{ matrix.backend }}-${{ hashFiles('glintfx/CMakeLists.txt') }}

      # EN: Install all build and runtime deps. The container (act-latest) ships
      #     git, curl, and build-essential, but NOT the graphics/GL stacks.
      #     Commands run as root inside the container -- no sudo needed.
      #     - git: required by CMake FetchContent to clone RmlUi.
      #     - libglfw3-dev: installed for BOTH configs -- in GLFW=OFF mode the embed
      #       tests use a hidden GLFW window as a test-only GL context fixture.
      #     - libgl1-mesa-dev / libegl1-mesa-dev: OpenGL + EGL headers (FindOpenGL).
      #     - libxkbcommon-dev: GLFW XKB keyboard-layout header.
      #     - libgl1-mesa-dri: llvmpipe -- Mesa software GL renderer (Xvfb GL backend).
      #     - xvfb: virtual X display + xvfb-run used by tests/run_xvfb.cmake.
      # PT: Instala todas as deps de build e runtime. O container (act-latest) inclui
      #     git, curl e build-essential, mas NAO as stacks de GL/graficos.
      #     Comandos rodam como root dentro do container -- sem sudo necessario.
      #     - git: necessario para FetchContent clonar o RmlUi.
      #     - libglfw3-dev: instalado em AMBAS as configs -- no modo GLFW=OFF os testes
      #       embed usam janela GLFW oculta como fixture de contexto GL so-de-teste.
      #     - libgl1-mesa-dev / libegl1-mesa-dev: headers OpenGL + EGL (FindOpenGL).
      #     - libxkbcommon-dev: header XKB do GLFW para layout de teclado.
      #     - libgl1-mesa-dri: llvmpipe -- renderer software GL do Mesa (backend GL Xvfb).
      #     - xvfb: display virtual X + xvfb-run usado por tests/run_xvfb.cmake.
      - name: install deps
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends \
            cmake g++ git \
            libglfw3-dev libfreetype-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            libgl1-mesa-dri \
            xvfb

      # EN: Configure with the matrix backend flag. Demos OFF -- showcase requires App/GLFW.
      # PT: Configura com a flag de backend da matrix. Demos OFF -- showcase requer App/GLFW.
      - name: configure
        run: |
          cmake -S glintfx -B glintfx/build-${{ matrix.backend }} \
            -DGLINTFX_BUILD_TESTS=ON \
            -DGLINTFX_BUILD_DEMOS=OFF \
            -DGLINTFX_BACKEND_GLFW=${{ matrix.backend }}

      - name: build
        run: cmake --build glintfx/build-${{ matrix.backend }} -j$(nproc)

      # EN: Run the test suite for this config under Xvfb (Mesa llvmpipe).
      #     GLFW=ON  runs 10 tests (5 GLFW-backend + 5 embed).
      #     GLFW=OFF runs  5 tests (5 embed only; GLFW/App tests excluded by CMake).
      #     run_xvfb.cmake calls xvfb-run -a per test; outer -a sets DISPLAY for ctest.
      # PT: Roda a suite de testes para esta config sob Xvfb (Mesa llvmpipe).
      #     GLFW=ON  roda 10 testes (5 backend GLFW + 5 embed).
      #     GLFW=OFF roda  5 testes (5 embed apenas; testes GLFW/App excluidos pelo CMake).
      #     run_xvfb.cmake chama xvfb-run -a por teste; o -a externo define DISPLAY para o ctest.
      - name: test
        run: xvfb-run -a ctest --test-dir glintfx/build-${{ matrix.backend }} --output-on-failure
