# SPDX-License-Identifier: MPL-2.0
# EN: Minimal-parity CI for glintfx on Codeberg (Forgejo Actions). Onda 3 of the CI
#     restructuring (política canônica de CI ratificada pelo líder, memória
#     feedback_ci_policy_canonica): this file was DELIBERATELY SHRUNK from a full
#     2-config matrix + lint-and-scan + coverage down to ONE job, ONE leg
#     (GLFW=ON), on `push` to `main` only. It exists purely as a voluntary
#     "it still builds on Codeberg" signal for the Codeberg mirror -- it is NOT a
#     release gate and NOT the primary CI. codeberg-medium is a shared, queued
#     runner (jobs can sit in `waiting` for minutes); that queueing is normal and
#     never blocks a release.
#
#     Where the real gates live now (see .forgejo/workflows/heavy.yml's own header
#     for the full rationale of each):
#       - GitHub Actions (.github/workflows/ci.yml + nightly.yml) is the PRIMARY
#         gate: full 2-config matrix (GLFW=ON/OFF), lint-and-scan (TST-L1-STATIC/
#         SECRETS/DEPS), coverage (TST-L1-COV, 75% floor), and the nightly
#         ASan/LSan/UBSan cron -- runs on every push/PR regardless of Codeberg's
#         runner availability.
#       - `claudio` (.forgejo/workflows/heavy.yml, self-hosted Forgejo runner) is
#         the DEPTH gate: the same ASan/LSan/UBSan sanitize job PROMOTED to a
#         blocking PR->main + tag check, plus the `fonteng`
#         (GLINTFX_OWN_FONT_ENGINE=ON) regression job.
#     Ratified convention: **github > claudio > codeberg** in gate authority. A
#     job stuck `waiting` on codeberg-medium is NEVER a reason to hold a release
#     or a merge -- only GitHub and/or claudio going red are.
#
#     What was removed from this file in Onda 3 (and why -- not silently
#     dropped, these had explicit líder-ratified homes elsewhere):
#       - `build-and-test-fonteng` (L1.20-FONTFLIP) -- now lives in
#         .forgejo/workflows/heavy.yml's `fonteng` job (claudio), which also
#         carries the CXXFLAGS SYS_futex clang workaround this job below still
#         needs for its own single leg.
#       - `lint-and-scan` (TST-L1-STATIC/SECRETS/DEPS) -- GitHub-only per the
#         líder's ratified decision; .github/workflows/ci.yml's lint-and-scan job
#         is the sole gate now, no Codeberg twin.
#       - `coverage` (TST-L1-COV/L1.18-COVCI) -- GitHub-only per the líder's
#         ratified decision (same fallback that job's own header comment had
#         already anticipated for a runner-budget overrun; here applied instead
#         for scope reduction). glintfx/coverage-badge.json is still committed to
#         the repo (generated by the GitHub job) so the README `Coverage` badge,
#         which reads the raw file straight off the Codeberg git blob, keeps
#         working with no CI running on Codeberg at all for it.
#
#     GLFW=OFF leg: also dropped from this file -- it is still exercised by
#     GitHub's full matrix and by claudio's `heavy.yml` sanitize/fonteng jobs.
#     Losing the OFF leg here only removes a REDUNDANT third confirmation, not a
#     unique one.
#
# PT: CI de paridade-mínima para o glintfx no Codeberg (Forgejo Actions). Onda 3
#     da reestruturação de CI (política canônica de CI ratificada pelo líder,
#     memória feedback_ci_policy_canonica): este arquivo foi DELIBERADAMENTE
#     ENCOLHIDO de uma matrix de 2 configs + lint-and-scan + coverage para UM
#     job, UMA perna (GLFW=ON), em `push` para `main` apenas. Ele existe
#     puramente como um sinal voluntário de "ainda builda no Codeberg" para o
#     mirror do Codeberg -- NÃO é gate de release e NÃO é o CI primário.
#     codeberg-medium é um runner compartilhado e enfileirado (jobs podem ficar
#     em `waiting` por minutos); esse enfileiramento é normal e nunca segura uma
#     release.
#
#     Onde os gates de verdade vivem agora (ver o cabeçalho de
#     .forgejo/workflows/heavy.yml para a racional completa de cada um):
#       - GitHub Actions (.github/workflows/ci.yml + nightly.yml) é o gate
#         PRIMÁRIO: matrix completa de 2 configs (GLFW=ON/OFF), lint-and-scan
#         (TST-L1-STATIC/SECRETS/DEPS), coverage (TST-L1-COV, piso 75%) e o cron
#         noturno ASan/LSan/UBSan -- roda em todo push/PR independente da
#         disponibilidade de runner do Codeberg.
#       - `claudio` (.forgejo/workflows/heavy.yml, runner self-hosted do Forgejo)
#         é o gate de PROFUNDIDADE: o mesmo job sanitize ASan/LSan/UBSan
#         PROMOVIDO a checagem bloqueante de PR->main + tag, mais o job de
#         regressão `fonteng` (GLINTFX_OWN_FONT_ENGINE=ON).
#     Convenção ratificada: **github > claudio > codeberg** em autoridade de
#     gate. Um job preso em `waiting` no codeberg-medium NUNCA é motivo para
#     segurar uma release ou um merge -- só GitHub e/ou claudio ficarem vermelhos
#     são.
#
#     O que foi removido deste arquivo na Onda 3 (e por quê -- não descartado em
#     silêncio, cada um tinha um destino explícito ratificado pelo líder):
#       - `build-and-test-fonteng` (L1.20-FONTFLIP) -- agora vive no job
#         `fonteng` de .forgejo/workflows/heavy.yml (claudio), que também carrega
#         o workaround CXXFLAGS SYS_futex do clang que o job abaixo ainda precisa
#         para a sua própria perna única.
#       - `lint-and-scan` (TST-L1-STATIC/SECRETS/DEPS) -- GitHub-only conforme
#         decisão ratificada pelo líder; o job lint-and-scan de
#         .github/workflows/ci.yml é o único gate agora, sem gêmeo no Codeberg.
#       - `coverage` (TST-L1-COV/L1.18-COVCI) -- GitHub-only conforme decisão
#         ratificada pelo líder (o mesmo fallback que o comentário de cabeçalho
#         daquele job já antecipava para estouro de orçamento de runner; aqui
#         aplicado por redução de escopo). O glintfx/coverage-badge.json continua
#         commitado no repo (gerado pelo job do GitHub), então o badge `Coverage`
#         do README, que lê o arquivo raw direto do blob git do Codeberg, segue
#         funcionando sem nenhum CI rodando no Codeberg para ele.
#
#     Perna GLFW=OFF: também removida deste arquivo -- continua exercitada pela
#     matrix completa do GitHub e pelos jobs sanitize/fonteng do `heavy.yml` no
#     claudio. Perder a perna OFF aqui só remove uma terceira confirmação
#     REDUNDANTE, não uma única.
name: ci

on:
  push:
    branches: [main]
    paths:
      - "glintfx/**"
      - ".forgejo/workflows/ci.yml"

# EN: Cancel in-progress runs on the same ref to spare the shared runner pool.
# PT: Cancela runs em andamento no mesmo ref para nao ocupar o pool compartilhado.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (codeberg-medium / GLFW=ON, minimal parity)
    # EN: codeberg-medium: 4 CPU / 8 GB / 10 min -- the stable global runner.
    #     Do NOT use 'ubuntu-latest' (GitHub label) or 'docker' (claudio, offline).
    # PT: codeberg-medium: 4 CPU / 8 GB / 10 min -- runner global estavel.
    #     NAO usar 'ubuntu-latest' (label GitHub) nem 'docker' (claudio, offline).
    runs-on: codeberg-medium
    container:
      # EN: act-latest: Codeberg official default, compat actions/setup-* and nektos/act.
      #     node:*-bookworm BREAKS actions/setup-python (codeberg/community#1718).
      # PT: act-latest: default oficial do Codeberg, compat actions/setup-* e nektos/act.
      #     node:*-bookworm QUEBRA actions/setup-python (codeberg/community#1718).
      image: ghcr.io/catthehacker/ubuntu:act-latest
    env:
      # EN: Workaround for a known libstdc++14 + clang incompatibility -- see
      #     .forgejo/workflows/heavy.yml's file-header comment (SYS_futex section)
      #     for the full bug rationale, or .github/workflows/ci.yml's build-and-test
      #     job for the original write-up. Purely additive (supplies a missing
      #     declaration, no behavioural change); still needed here because this job
      #     builds RmlUi from scratch with clang++ on ubuntu act-latest's older
      #     libstdc++14.
      # PT: Workaround para uma incompatibilidade conhecida libstdc++14 + clang --
      #     ver o comentário de cabeçalho de .forgejo/workflows/heavy.yml (seção
      #     SYS_futex) para a racional completa do bug, ou o job build-and-test de
      #     .github/workflows/ci.yml para o registro original. Puramente aditivo
      #     (supre uma declaração faltante, sem mudança de comportamento); ainda
      #     necessário aqui porque este job builda o RmlUi do zero com clang++ no
      #     libstdc++14 mais antigo do ubuntu act-latest.
      CXXFLAGS: "-include sys/syscall.h"
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build/_deps
          key: rmlui-${{ runner.os }}-glfwON-${{ hashFiles('glintfx/CMakeLists.txt') }}

      # EN: Install all build and runtime deps. The container (act-latest) ships
      #     git, curl, and build-essential, but NOT the graphics/GL stacks.
      #     Commands run as root inside the container -- no sudo needed.
      # PT: Instala todas as deps de build e runtime. O container (act-latest) inclui
      #     git, curl e build-essential, mas NAO as stacks de GL/graficos.
      #     Comandos rodam como root dentro do container -- sem sudo necessario.
      - name: install deps
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends \
            cmake clang git \
            libglfw3-dev libfreetype-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            libgl1-mesa-dri \
            xvfb

      # EN: CMAKE_C_COMPILER/CMAKE_CXX_COMPILER pinned to clang/clang++ -- aligns
      #     the build with README.md's declared toolchain.
      # PT: CMAKE_C_COMPILER/CMAKE_CXX_COMPILER fixados em clang/clang++ -- alinha
      #     o build ao toolchain declarado no README.md.
      - name: configure
        run: |
          cmake -S glintfx -B glintfx/build \
            -DGLINTFX_BUILD_TESTS=ON \
            -DGLINTFX_BUILD_DEMOS=OFF \
            -DGLINTFX_BACKEND_GLFW=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: build
        run: cmake --build glintfx/build -j$(nproc)

      # EN: run_xvfb.cmake calls xvfb-run -a per test; outer -a sets DISPLAY for ctest.
      # PT: run_xvfb.cmake chama xvfb-run -a por teste; o -a externo define DISPLAY para o ctest.
      - name: test
        run: xvfb-run -a ctest --test-dir glintfx/build --output-on-failure
