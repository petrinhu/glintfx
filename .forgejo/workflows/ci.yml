# SPDX-License-Identifier: MPL-2.0
# EN: CI pipeline for glintfx on Codeberg (Forgejo Actions).
#     Builds the library and runs the 5-test suite under Xvfb / Mesa llvmpipe.
#     Triggers on every push or PR that modifies glintfx/ or this workflow file.
#
#     Runner note: codeberg-medium (4 CPU / 8 GB / 10 min) is the active global
#     runner as of 2026-06-13. Runner state oscillates — reconfirm at
#     codeberg.org/actions/meta before the first push. If the job sits in
#     `waiting` for minutes, that is queue congestion (not a YAML error) — wait,
#     or switch to codeberg-medium-lazy (up to 24h window).
#
#     Container: ghcr.io/catthehacker/ubuntu:act-latest is the current Codeberg
#     default (compat nektos/act + GitHub Actions). Codeberg global runners do NOT
#     have language stacks pre-installed — all deps are installed in `install deps`.
#
# PT: Pipeline de CI para glintfx no Codeberg (Forgejo Actions).
#     Builda a biblioteca e roda a suíte de 5 testes sob Xvfb / Mesa llvmpipe.
#     Disparado em todo push ou PR que modifica glintfx/ ou este workflow.
#
#     Nota de runner: codeberg-medium (4 CPU / 8 GB / 10 min) é o runner global
#     ativo em 2026-06-13. Estado oscila — reconfirmar em codeberg.org/actions/meta
#     antes do 1º push. Se o job ficar em `waiting`, é fila (não erro de YAML).
#
#     Container: ghcr.io/catthehacker/ubuntu:act-latest é o default atual do
#     Codeberg. Runners globais NÃO têm stacks pré-instaladas — todas as deps
#     são instaladas no step `install deps`.
name: ci

on:
  push:
    paths:
      - "glintfx/**"
      - ".forgejo/workflows/ci.yml"
  pull_request:
    paths:
      - "glintfx/**"
      - ".forgejo/workflows/ci.yml"

# EN: Cancel in-progress runs on the same ref to spare the shared runner pool.
# PT: Cancela runs em andamento no mesmo ref para não ocupar o pool compartilhado.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (codeberg-medium / llvmpipe)
    # EN: codeberg-medium: 4 CPU / 8 GB / 10 min — the stable global runner.
    #     Do NOT use 'ubuntu-latest' (GitHub label) or 'docker' (claudio, offline).
    # PT: codeberg-medium: 4 CPU / 8 GB / 10 min — runner global estável.
    #     NÃO usar 'ubuntu-latest' (label GitHub) nem 'docker' (claudio, offline).
    runs-on: codeberg-medium
    container:
      # EN: act-latest is the Codeberg official default: compatible with
      #     actions/setup-*, nektos/act, and GitHub Actions syntax.
      #     node:*-bookworm BREAKS actions/setup-python (codeberg/community#1718).
      # PT: act-latest é o default oficial do Codeberg: compat com actions/setup-*,
      #     nektos/act e sintaxe do GitHub Actions.
      #     node:*-bookworm QUEBRA actions/setup-python (codeberg/community#1718).
      image: ghcr.io/catthehacker/ubuntu:act-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # EN: Cache the FetchContent clone of RmlUi, keyed on CMakeLists.txt so the cache
      #     invalidates automatically whenever the pinned GIT_TAG changes.
      # PT: Cache do clone FetchContent do RmlUi, chaveado no CMakeLists.txt para
      #     invalidar automaticamente quando o GIT_TAG pinado mudar.
      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build/_deps
          key: rmlui-${{ runner.os }}-${{ hashFiles('glintfx/CMakeLists.txt') }}

      # EN: Install all build and runtime deps. The container image (act-latest) ships
      #     git, curl, sudo, and build-essential, but NOT the graphics/GL stacks.
      #     Commands run as root inside the container — no sudo needed.
      #     - git: required by CMake FetchContent to clone RmlUi.
      #     - libgl1-mesa-dev / libegl1-mesa-dev: OpenGL + EGL headers (FindOpenGL).
      #     - libxkbcommon-dev: GLFW XKB keyboard-layout header.
      #     - libgl1-mesa-dri: llvmpipe — Mesa software GL renderer (Xvfb GL backend).
      #     - xvfb: virtual X display + xvfb-run used by tests/run_xvfb.cmake.
      # PT: Instala todas as deps de build e runtime. O container (act-latest) inclui
      #     git, curl, sudo e build-essential, mas NÃO as stacks de GL/gráficos.
      #     Comandos rodam como root dentro do container — sem sudo necessário.
      #     - git: necessário para FetchContent clonar o RmlUi.
      #     - libgl1-mesa-dev / libegl1-mesa-dev: headers OpenGL + EGL (FindOpenGL).
      #     - libxkbcommon-dev: header XKB do GLFW para layout de teclado.
      #     - libgl1-mesa-dri: llvmpipe — renderer software GL do Mesa (backend GL do Xvfb).
      #     - xvfb: display virtual X + xvfb-run usado por tests/run_xvfb.cmake.
      - name: install deps
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends \
            cmake g++ git \
            libglfw3-dev libfreetype-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            libgl1-mesa-dri \
            xvfb

      # EN: Configure: tests ON, demos OFF. The test CMakeLists.txt copies the showcase
      #     assets (RML/RCSS/fonts) from the source tree at configure time.
      # PT: Configura: testes ON, demos OFF. O CMakeLists.txt dos testes copia os assets
      #     do showcase do source tree em configure.
      - name: configure
        run: |
          cmake -S glintfx -B glintfx/build \
            -DGLINTFX_BUILD_TESTS=ON \
            -DGLINTFX_BUILD_DEMOS=OFF

      - name: build
        run: cmake --build glintfx/build -j$(nproc)

      # EN: Run the 5-test suite: window_smoke, render_smoke, bootstrap_smoke, app_smoke,
      #     render_sanity. run_xvfb.cmake calls xvfb-run -a per test; outer -a sets
      #     DISPLAY for ctest itself; nested -a picks a free display (no conflict).
      # PT: Roda 5 testes: window_smoke, render_smoke, bootstrap_smoke, app_smoke,
      #     render_sanity. run_xvfb.cmake chama xvfb-run -a por teste; o -a externo
      #     define DISPLAY para o ctest; o -a aninhado escolhe display livre (sem conflito).
      - name: test
        run: xvfb-run -a ctest --test-dir glintfx/build --output-on-failure
