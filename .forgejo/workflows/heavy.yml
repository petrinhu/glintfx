# SPDX-License-Identifier: MPL-2.0
# EN: Heavy CI gates for glintfx on the self-hosted `claudio` Forgejo runner (política
#     canônica de CI ratificada pelo líder, memória feedback_ci_policy_canonica --
#     Onda 1, ADITIVA at the time it landed). UPDATED Onda 3 (2026-07-11): this job's
#     `sanitize` gate now REPLACES .forgejo/workflows/nightly.yml as the PR/tag ASan
#     gate on Codeberg's side -- that file was deleted (it is fully subsumed by this
#     one, promoted from cron to a blocking check). The GitHub-side nightly cron
#     (.github/workflows/nightly.yml) stays intact and unchanged as the redundant
#     safety net; .forgejo/workflows/ci.yml also stays, but shrunk to minimal parity
#     (see that file's own header). Two jobs:
#       - `sanitize`  -- the ASan/LSan/UBSan memory-safety gate (same flags the
#         deleted .forgejo/workflows/nightly.yml used), a PR->main + tag gate (the
#         líder's ratified decision: the nightly cron on GitHub remains as a
#         redundant safety net -- see .github/workflows/nightly.yml -- this job does
#         NOT replace that GitHub cron, only the now-deleted Forgejo-side nightly
#         file).
#       - `fonteng`   -- ported step-for-step from .forgejo/workflows/ci.yml's
#         `build-and-test-fonteng` job (L1.20-FONTFLIP regression gate for glintfx's own
#         font engine, GLINTFX_OWN_FONT_ENGINE=ON).
#
#     Runner: `claudio` (UUID 700b0e93-9831-4011-9fcd-1ff30f92e91d in this machine's
#     /var/lib/forgejo-runner/config.yaml, label `docker:docker://node:lts`,
#     forgejo-runner.service already active as a system service -- this workflow does
#     NOT register/reconfigure the runner). `claudio` is a SINGLE always-on machine, not
#     an elastic pool: it can be offline/busy/rebooting outside the líder's control.
#     Policy: a green run on EITHER remote is enough (github > claudio > codeberg in
#     gate authority) -- GitHub's nightly cron (.github/workflows/nightly.yml) is the
#     primary safety net; if `claudio` is unreachable when a PR/tag needs this gate,
#     that is an operational finding to surface to the líder, not a reason to
#     silently relax the gate here.
#
#     Container: `container: image: localhost/glintfx-ci:f42` -- built by
#     tools/ci/build_image.sh from tools/ci/Containerfile.f42 (fedora:42 base + every
#     dep pre-installed, see that file's header for the full package rationale,
#     including nodejs being MANDATORY for actions/checkout@v4 to run at all on a bare
#     Fedora base). `localhost/...` resolves because forgejo-runner's
#     `container.force_pull` defaults to `false` (confirmed in this machine's
#     config.yaml -- no override present, see this task's validation step (e)); the
#     image must be (re)built with tools/ci/build_image.sh on `claudio` itself whenever
#     Containerfile.f42 changes, this workflow does not build it.
#
#     SYS_futex / libstdc+++clang workaround: .forgejo/workflows/ci.yml's
#     `build-and-test` job (ubuntu act-latest, libstdc++14) needs
#     `CXXFLAGS: "-include sys/syscall.h"` to build RmlUi from scratch with clang++
#     (see that file's `env:` comment for the full bug rationale). CORRECTED
#     2026-07-10 (this note previously claimed Fedora 42 did NOT need the same
#     workaround -- that was WRONG, disproven by a live CI failure): live run #51
#     (`fonteng`, both GLFW configs) failed on THIS image
#     (localhost/glintfx-ci:f42) with clang++ hitting "use of undeclared
#     identifier 'SYS_futex'" in libstdc++15's `<bits/atomic_wait.h>` (GCC 15
#     header, Fedora 42) while building RmlUi from scratch. The bug is
#     CLANG-SPECIFIC (gcc's own headers pull `<sys/syscall.h>` in transitively
#     elsewhere; clang's driver does not) -- which is exactly why the gcc
#     `sanitize` job below is unaffected, while the clang `fonteng` job needs the
#     flag. Fixed in commit `6225ae9`: the `fonteng` job below now carries
#     `CXXFLAGS: "-include sys/syscall.h"` in its own `env:` block (identical to
#     ci.yml's), and run #53 confirmed green with it. DO NOT remove that `env:`
#     block from the `fonteng` job -- it is the fix, not a leftover. The
#     `sanitize` job (gcc, no clang involved) never needed and still does not
#     need this workaround.
#
#     ASan runtime packages: Fedora 42's `gcc` package does NOT pull in the runtime
#     libasan.so.8/libubsan.so.1 shared objects the linker needs for
#     `-fsanitize=address,undefined` (only the compiler-time symlinks) -- REPRODUCED
#     live (política (e)) as two separate link failures ("ld: cannot find
#     /usr/lib64/libasan.so.8.0.0", then, once libasan was added, "ld: cannot find
#     /usr/lib64/libubsan.so.1.0.0") before tools/ci/Containerfile.f42 gained the
#     `libasan`+`libubsan` packages. See that file's header comment for the full
#     finding; this is why the `sanitize` job below can rely on the image already having
#     both.
#
# PT: Gates pesados de CI para o glintfx no runner self-hosted `claudio` do Forgejo
#     (política canônica de CI ratificada pelo líder, memória
#     feedback_ci_policy_canonica -- Onda 1, ADITIVA quando chegou). ATUALIZADO na
#     Onda 3 (2026-07-11): o gate `sanitize` deste job agora SUBSTITUI
#     .forgejo/workflows/nightly.yml como gate ASan de PR/tag do lado Codeberg --
#     aquele arquivo foi deletado (fica totalmente subsumido por este, promovido de
#     cron para checagem bloqueante). O cron noturno do lado GitHub
#     (.github/workflows/nightly.yml) permanece intacto e inalterado como rede de
#     segurança redundante; .forgejo/workflows/ci.yml também permanece, mas encolhido
#     a paridade mínima (ver o cabeçalho daquele arquivo). Dois jobs:
#       - `sanitize`  -- o gate de memory-safety ASan/LSan/UBSan (mesmas flags que o
#         .forgejo/workflows/nightly.yml deletado usava), gate de PR->main + tag
#         (decisão ratificada pelo líder: o cron noturno no GitHub permanece como
#         rede de segurança redundante -- ver .github/workflows/nightly.yml -- este
#         job NÃO substitui aquele cron do GitHub, só o arquivo nightly do lado
#         Forgejo, agora deletado).
#       - `fonteng`   -- portado passo a passo do job `build-and-test-fonteng` de
#         .forgejo/workflows/ci.yml (gate de regressão L1.20-FONTFLIP do motor de fonte
#         próprio do glintfx, GLINTFX_OWN_FONT_ENGINE=ON).
#
#     Runner: `claudio` (UUID 700b0e93-9831-4011-9fcd-1ff30f92e91d no
#     /var/lib/forgejo-runner/config.yaml desta máquina, label
#     `docker:docker://node:lts`, forgejo-runner.service já ativo como serviço de
#     sistema -- este workflow NÃO registra/reconfigura o runner). `claudio` é uma ÚNICA
#     máquina sempre ligada, não um pool elástico: pode estar offline/ocupada/reiniciando
#     fora do controle do líder. Política: um run verde em QUALQUER dos 2 remotos basta
#     (github > claudio > codeberg em autoridade de gate) -- o cron noturno do GitHub
#     (.github/workflows/nightly.yml) é a rede de segurança primária; se o `claudio`
#     estiver inalcançável quando um PR/tag precisar deste gate, isso é um achado
#     operacional a reportar ao líder, não motivo para relaxar o gate em silêncio aqui.
#
#     Container: `container: image: localhost/glintfx-ci:f42` -- buildado por
#     tools/ci/build_image.sh a partir de tools/ci/Containerfile.f42 (base fedora:42 +
#     toda dep pré-instalada, ver o cabeçalho daquele arquivo para o racional completo de
#     pacotes, incluindo o nodejs ser OBRIGATÓRIO pro actions/checkout@v4 sequer rodar
#     numa base Fedora crua). `localhost/...` resolve porque o `container.force_pull` do
#     forgejo-runner tem default `false` (confirmado no config.yaml desta máquina --
#     nenhum override presente, ver o passo de validação (e) desta task); a imagem
#     precisa ser (re)buildada com tools/ci/build_image.sh no próprio `claudio` sempre
#     que Containerfile.f42 mudar, este workflow não a builda.
#
#     Workaround SYS_futex / libstdc+++clang: o job `build-and-test` de
#     .forgejo/workflows/ci.yml (ubuntu act-latest, libstdc++14) precisa de
#     `CXXFLAGS: "-include sys/syscall.h"` para buildar o RmlUi do zero com clang++
#     (ver o comentário `env:` daquele arquivo para o racional completo do bug).
#     CORRIGIDO em 2026-07-10 (esta nota antes afirmava que o Fedora 42 NÃO precisava
#     do mesmo workaround -- estava ERRADA, desmentida por uma falha real de CI): o
#     run #51 ao vivo (`fonteng`, AS 2 configs) falhou NESTA imagem
#     (localhost/glintfx-ci:f42) com o clang++ batendo em "use of undeclared
#     identifier 'SYS_futex'" no `<bits/atomic_wait.h>` do libstdc++15 (header do GCC
#     15, Fedora 42) ao buildar o RmlUi do zero. O bug é ESPECÍFICO DO CLANG (os
#     próprios headers do gcc puxam `<sys/syscall.h>` transitivamente em outro lugar;
#     o driver do clang não) -- é exatamente por isso que o job `sanitize` (gcc)
#     abaixo não é afetado, enquanto o job `fonteng` (clang) precisa da flag.
#     Corrigido no commit `6225ae9`: o job `fonteng` abaixo agora carrega
#     `CXXFLAGS: "-include sys/syscall.h"` no seu próprio bloco `env:` (idêntico ao
#     de ci.yml), e o run #53 confirmou verde com ele. NÃO remover esse bloco `env:`
#     do job `fonteng` -- é o fix, não sobra de código. O job `sanitize` (gcc, sem
#     clang envolvido) nunca precisou e continua não precisando deste workaround.
#
#     Pacotes de runtime do ASan: o pacote `gcc` do Fedora 42 NÃO traz os shared objects
#     de runtime libasan.so.8/libubsan.so.1 que o linker precisa para
#     `-fsanitize=address,undefined` (só os symlinks de tempo-de-compilação) --
#     REPRODUZIDO ao vivo (política (e)) como duas falhas de link separadas ("ld: cannot
#     find /usr/lib64/libasan.so.8.0.0", depois, uma vez o libasan adicionado, "ld:
#     cannot find /usr/lib64/libubsan.so.1.0.0") antes de tools/ci/Containerfile.f42
#     ganhar os pacotes `libasan`+`libubsan`. Ver o comentário de cabeçalho daquele
#     arquivo para o achado completo; é por isso que o job `sanitize` abaixo pode contar
#     com a imagem já tendo os dois.
name: heavy

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]
  workflow_dispatch:

# EN: Own concurrency group, independent of ci.yml's -- these jobs run on a
#     different runner (claudio, not codeberg-medium) so they never contend for the same
#     runner-pool slot, but still cancel a stale in-progress run on the same ref.
# PT: Grupo de concorrência próprio, independente do de ci.yml -- estes jobs
#     rodam num runner diferente (claudio, não codeberg-medium) então nunca disputam a
#     mesma vaga do pool, mas ainda assim cancelam um run em andamento obsoleto no mesmo
#     ref.
concurrency:
  group: heavy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # EN: sanitize -- ASan/LSan/UBSan memory-safety gate (TST-L1-MEM, TODO.md LW-TST).
  #     Ported from the (now-deleted, Onda 3) .forgejo/workflows/nightly.yml's
  #     `sanitize` job content exactly (same matrix, same configure/build/test flags,
  #     same un-pinned default compiler -- on this image that resolves to gcc,
  #     matching that deleted file's own `apt-get install g++` choice, not clang; the
  #     SYS_futex workaround discussed in the file header is therefore moot for THIS
  #     job specifically, it only ever mattered for clang builds), now the sole PR->main
  #     + tag ASan gate on Codeberg's side per the líder's ratified policy.
  # PT: sanitize -- gate de memory-safety ASan/LSan/UBSan (TST-L1-MEM, TODO.md LW-TST).
  #     Portado exatamente do conteúdo do job `sanitize` do
  #     .forgejo/workflows/nightly.yml (agora deletado, Onda 3) -- mesma matrix,
  #     mesmas flags de configure/build/test, mesmo compilador default não-fixado --
  #     nesta imagem isso resolve para gcc, batendo com a própria escolha `apt-get
  #     install g++` daquele arquivo deletado, não clang; o workaround SYS_futex
  #     discutido no cabeçalho do arquivo portanto não se aplica a ESTE job
  #     especificamente, só importou para builds clang -- agora o único gate ASan de
  #     PR->main + tag do lado Codeberg conforme a política ratificada pelo líder.
  sanitize:
    name: sanitize (claudio / GLFW=${{ matrix.backend }})
    runs-on: docker
    container:
      image: localhost/glintfx-ci:f42
    strategy:
      fail-fast: false
      matrix:
        backend: [ON, OFF]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # EN: Cache key namespaced with "claudio-f42" -- deliberately DIFFERENT from
      #     ci.yml's "rmlui-${{ runner.os }}-..." keys (the deleted nightly.yml used
      #     the same convention). The cached path
      #     includes RmlUi's BUILT object files (FetchContent's _deps/rmlui-build), not
      #     just cloned source -- reusing a codeberg-medium (ubuntu act-latest,
      #     different libc/compiler ABI) cache entry here would risk linking
      #     ABI-mismatched objects. Never unify this key with the codeberg-medium jobs'.
      # PT: Chave de cache namespaced com "claudio-f42" -- deliberadamente DIFERENTE das
      #     chaves "rmlui-${{ runner.os }}-..." de ci.yml (o nightly.yml deletado usava
      #     a mesma convenção). O path cacheado
      #     inclui os object files JÁ BUILDADOS do RmlUi (_deps/rmlui-build do
      #     FetchContent), não só o source clonado -- reusar uma entrada de cache do
      #     codeberg-medium (ubuntu act-latest, ABI de libc/compilador diferente) aqui
      #     arriscaria linkar objetos com ABI incompatível. Nunca unificar esta chave com
      #     a dos jobs codeberg-medium.
      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build-asan-${{ matrix.backend }}/_deps
          key: rmlui-claudio-f42-sanitize-glfw${{ matrix.backend }}-${{ hashFiles('glintfx/CMakeLists.txt') }}

      # EN: All deps (cmake/git/glfw/freetype/mesa/xkbcommon/xvfb/libasan/libubsan)
      #     already baked into localhost/glintfx-ci:f42 -- no install step needed,
      #     unlike the codeberg-medium jobs which install into a stock catthehacker
      #     image every run. This IS the speed payoff described in
      #     tools/ci/Containerfile.f42's header comment.
      # PT: Todas as deps (cmake/git/glfw/freetype/mesa/xkbcommon/xvfb/libasan/libubsan)
      #     já vêm embutidas em localhost/glintfx-ci:f42 -- nenhum passo de instalação
      #     necessário, diferente dos jobs codeberg-medium que instalam numa imagem
      #     catthehacker crua a cada execução. Este É o ganho de velocidade descrito no
      #     comentário de cabeçalho de tools/ci/Containerfile.f42.
      - name: configure (GLINTFX_SANITIZE=ON)
        run: |
          cmake -S glintfx -B glintfx/build-asan-${{ matrix.backend }} \
            -DGLINTFX_BUILD_TESTS=ON \
            -DGLINTFX_BUILD_DEMOS=OFF \
            -DGLINTFX_BACKEND_GLFW=${{ matrix.backend }} \
            -DGLINTFX_SANITIZE=ON \
            -DCMAKE_BUILD_TYPE=Debug

      - name: build
        run: cmake --build glintfx/build-asan-${{ matrix.backend }} -j$(nproc)

      - name: test (ASan + LSan + UBSan)
        run: xvfb-run -a ctest --test-dir glintfx/build-asan-${{ matrix.backend }} --output-on-failure

  # EN: fonteng -- L1.20-FONTFLIP. Ported step-for-step from
  #     .forgejo/workflows/ci.yml's `build-and-test-fonteng` job -- see that job's own
  #     header comment for the full rationale (regression gate for glintfx's own
  #     SOV-SFNT/SOV-RAST font engine). Clang-pinned, WITHOUT the SYS_futex CXXFLAGS
  #     workaround -- see this file's top-of-file comment for why that workaround was
  #     tested and found unnecessary on this image.
  # PT: fonteng -- L1.20-FONTFLIP. Portado passo a passo do job `build-and-test-fonteng`
  #     de .forgejo/workflows/ci.yml -- ver o comentário de cabeçalho daquele job para o
  #     racional completo (gate de regressão do motor de fonte próprio
  #     SOV-SFNT/SOV-RAST do glintfx). Clang-fixado, SEM o workaround CXXFLAGS
  #     SYS_futex -- ver o comentário de topo deste arquivo para o porquê desse
  #     workaround ter sido testado e considerado desnecessário nesta imagem.
  fonteng:
    name: fonteng (claudio / GLFW=${{ matrix.backend }})
    runs-on: docker
    container:
      image: localhost/glintfx-ci:f42
    # EN: SYS_futex workaround IS needed here after all. The Onda-1 local probe that
    #     concluded "Fedora 42 doesn't need it" was MISLEADING -- CI run #51 (fonteng,
    #     BOTH configs) failed with clang++ hitting "use of undeclared identifier
    #     'SYS_futex'" in libstdc++15's <bits/atomic_wait.h> (GCC 15 header, Fedora 42).
    #     The bug is CLANG-SPECIFIC (gcc pulls <sys/syscall.h> transitively, clang does
    #     not) -- which is exactly why the gcc `sanitize` jobs above are unaffected and
    #     PASS, while these clang `fonteng` jobs need the flag. Identical to the same env
    #     in .forgejo/workflows/ci.yml; purely additive (supplies a missing declaration,
    #     changes no behaviour). The file-header note above claiming this image doesn't
    #     need it is superseded by this finding.
    # PT: O workaround SYS_futex É necessário aqui. A sonda local da Onda 1 que concluiu
    #     "o Fedora 42 não precisa" ENGANOU -- o run #51 do CI (fonteng, AS 2 configs)
    #     falhou com clang++ batendo em "use of undeclared identifier 'SYS_futex'" no
    #     <bits/atomic_wait.h> do libstdc++15 (header do GCC 15, Fedora 42). O bug é
    #     ESPECÍFICO DO CLANG (gcc puxa <sys/syscall.h> transitivo, clang não) -- é por
    #     isso que os jobs gcc `sanitize` acima não são afetados e PASSAM, enquanto estes
    #     jobs clang `fonteng` precisam da flag. Idêntico ao mesmo env em
    #     .forgejo/workflows/ci.yml; puramente aditivo. A nota do cabeçalho do arquivo
    #     acima que afirma que esta imagem não precisa fica superada por este achado.
    # EN: GLINTFX_PERF_STRICT=1 (PERF-D2D3, D30) -- arms the strict 1.5x-baseline gate in
    #     tests/draw2d_perf_budget.cpp, ONLY on this claudio job (never in ci.yml/nightly.yml):
    #     claudio is the one stable, always-on machine this house's baseline constants were meant
    #     for. Everywhere else the test still runs and still prints its GLINTFX_PERF lines, just
    #     under the loose 10x sanity ceiling instead -- see that file's own header comment for the
    #     full two-tier gate design and the baseline-provenance caveat.
    # PT: GLINTFX_PERF_STRICT=1 (PERF-D2D3, D30) -- arma o gate estrito de baseline 1,5x em
    #     tests/draw2d_perf_budget.cpp, SÓ neste job claudio (nunca em ci.yml/nightly.yml): o
    #     claudio é a única máquina estável e sempre-ligada para a qual as constantes de baseline
    #     desta casa foram pensadas. Em todo outro lugar o teste ainda roda e ainda imprime as
    #     próprias linhas GLINTFX_PERF, só que sob o teto de sanidade frouxo de 10x -- ver o
    #     comentário de cabeçalho daquele arquivo pro desenho completo do gate de dois níveis e a
    #     ressalva de proveniência da baseline.
    env:
      CXXFLAGS: "-include sys/syscall.h"
      GLINTFX_PERF_STRICT: "1"
    strategy:
      fail-fast: false
      matrix:
        backend: [ON, OFF]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build-fonteng-${{ matrix.backend }}/_deps
          key: rmlui-claudio-f42-fonteng-glfw${{ matrix.backend }}-${{ hashFiles('glintfx/CMakeLists.txt') }}

      - name: configure
        run: |
          cmake -S glintfx -B glintfx/build-fonteng-${{ matrix.backend }} \
            -DGLINTFX_BUILD_TESTS=ON \
            -DGLINTFX_BUILD_DEMOS=OFF \
            -DGLINTFX_BACKEND_GLFW=${{ matrix.backend }} \
            -DGLINTFX_OWN_FONT_ENGINE=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: build
        run: cmake --build glintfx/build-fonteng-${{ matrix.backend }} -j$(nproc)

      - name: test
        run: xvfb-run -a ctest --test-dir glintfx/build-fonteng-${{ matrix.backend }} --output-on-failure
