# SPDX-License-Identifier: MPL-2.0
# EN: CI pipeline for glintfx -- builds the library and runs both test suites under
#     Xvfb / Mesa llvmpipe (software GL) via a 2-config matrix, PLUS a parallel
#     `lint-and-scan` job with 3 CI-now, sempre-verde gates (TESTES.md "Camada 1",
#     TODO.md LW-TST): TST-L1-STATIC (clang-tidy + cppcheck + the
#     tools/check_encapsulation.sh third-party-leak gate), TST-L1-SECRETS (gitleaks,
#     history + working tree), TST-L1-DEPS (grype dir scan). See job comments below
#     for tool choice rationale and the exact severity thresholds.
#       GLFW=ON  -- 18 tests: window_smoke render_smoke engine_smoke app_smoke
#                   app_dp_ratio_smoke render_sanity data_model_smoke data_model_scalar
#                   data_model_list texture_png_alpha (10 GLFW-only) + ui_layer_attach
#                   compose gl_state_guard events sanity dp_ratio_sanity base_url_sanity
#                   ua_stylesheet_sanity (8 embed)
#       GLFW=OFF --  8 embed tests: ui_layer_attach compose gl_state_guard events sanity
#                   dp_ratio_sanity base_url_sanity ua_stylesheet_sanity
#     PLUS `build-and-test-fonteng` -- L1.20-FONTFLIP: same 2-config backend matrix, with
#     GLINTFX_OWN_FONT_ENGINE=ON added on top, so the own SOV-SFNT/SOV-RAST font engine
#     (L1.19-FONTENG, default OFF, previously untested by CI) gets fonteng_own_sanity +
#     fonteng_own_embed_sanity exercised on every push/PR too.
#     Triggers (Onda 2, canonical CI policy, decision (i)=A): push to `main` (paths-
#     filtered to glintfx/ or this workflow file) + push of a `v*` tag (unconditional,
#     no paths filter -- see rationale below) + PR targeting `main` (paths-filtered).
#     A push to any OTHER branch (feature branch) does NOT trigger this heavy gate --
#     this repo is trunk-based (commits land directly on `main`, no long-lived feature
#     branches), so scoping to `push: branches: [main]` still fires the gate on every
#     real commit that reaches trunk; PR-only would mean this workflow never runs in
#     the actual day-to-day flow. Tags are combined with `paths` in the SAME `push:`
#     block (not a separate trigger) because GitHub Actions cannot diff a brand-new ref
#     against a prior state, so path filters always match (i.e. the gate always runs)
#     on a freshly-pushed tag regardless of which paths it touches -- exactly the
#     "always run on release tag" behaviour wanted here. `nightly.yml` (GitHub cron)
#     and `core-ci.yml` (Layer 0, light) are UNTOUCHED by this policy -- nightly stays
#     the safety net, core-ci is out of scope (not glintfx).
#     Runs on GitHub Actions free Ubuntu runners (no container needed).
# PT: Pipeline de CI para glintfx -- builda a biblioteca e roda ambas as suites sob
#     Xvfb / Mesa llvmpipe (GL software) via matrix de 2 configs:
#       GLFW=ON  -- 18 testes: window_smoke render_smoke engine_smoke app_smoke
#                   app_dp_ratio_smoke render_sanity data_model_smoke data_model_scalar
#                   data_model_list texture_png_alpha (10 so-GLFW) + ui_layer_attach
#                   compose gl_state_guard events sanity dp_ratio_sanity base_url_sanity
#                   ua_stylesheet_sanity (8 embed)
#       GLFW=OFF --  8 testes embed: ui_layer_attach compose gl_state_guard events sanity
#                   dp_ratio_sanity base_url_sanity ua_stylesheet_sanity
#     MAIS `build-and-test-fonteng` -- L1.20-FONTFLIP: mesma matrix de 2 configs de backend,
#     com GLINTFX_OWN_FONT_ENGINE=ON somado por cima, para que o motor de fonte próprio
#     SOV-SFNT/SOV-RAST (L1.19-FONTENG, OFF por padrão, antes sem teste no CI) tenha
#     fonteng_own_sanity + fonteng_own_embed_sanity exercitados em todo push/PR também.
#     Triggers (Onda 2, política canônica de CI, decisão (i)=A): push na `main`
#     (filtrado por paths a glintfx/ ou este workflow) + push de tag `v*`
#     (incondicional, sem filtro de paths -- ver racional abaixo) + PR mirando a `main`
#     (filtrado por paths). Push em QUALQUER OUTRA branch (branch de feature) NÃO
#     dispara este gate pesado -- este repo é trunk-based (commits vão direto pra
#     `main`, sem branch de feature de vida longa), então restringir a
#     `push: branches: [main]` ainda dispara o gate em todo commit real que chega na
#     trunk; PR-only significaria este workflow nunca rodar no fluxo real do dia a dia.
#     Tags são combinadas com `paths` no MESMO bloco `push:` (não um trigger separado)
#     porque o GitHub Actions não consegue calcular diff de uma ref recém-criada contra
#     um estado anterior, então o filtro de paths sempre casa (ou seja, o gate sempre
#     roda) numa tag recém-empurrada, independente de quais paths ela toca -- exatamente
#     o comportamento "sempre roda em tag de release" desejado aqui. `nightly.yml`
#     (cron do GitHub) e `core-ci.yml` (Camada 0, leve) ficam INTOCADOS por esta
#     política -- o nightly continua como rede de segurança, o core-ci está fora do
#     escopo (não é glintfx).
#     Roda em runners Ubuntu gratuitos do GitHub Actions (sem container necessario).
name: ci

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "glintfx/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "glintfx/**"
      - ".github/workflows/ci.yml"

jobs:
  build-and-test:
    name: build & test (ubuntu-latest / GLFW=${{ matrix.backend }})
    runs-on: ubuntu-latest
    env:
      # EN: Workaround for a known libstdc++14 + clang incompatibility that broke this
      #     job (and every other job below that runs `cmake --build`) on 2026-07-10 (CI
      #     run 29112917463): libstdc++'s <bits/atomic_wait.h> uses the SYS_futex
      #     syscall-number macro without including <sys/syscall.h> itself -- gcc's own
      #     headers pull that header in transitively elsewhere, clang's driver does not.
      #     A from-scratch build of RmlUi with clang++ (FreeTypeInterface.cpp includes
      #     <atomic>) against Ubuntu's libstdc++14 then fails with "use of undeclared
      #     identifier 'SYS_futex'". `-include sys/syscall.h` forces every translation
      #     unit to see the declaration first -- purely additive, no behavioural change
      #     (does NOT disable/replace the futex codepath the way
      #     -D_GLIBCXX_HAVE_LINUX_FUTEX=0 would; it just supplies the missing
      #     declaration for a macro libstdc++ already unconditionally uses).
      #     This is a CXXFLAGS env var (not -DCMAKE_CXX_FLAGS on the cmake command line)
      #     so CMake's initial-cache population picks it up on EVERY fresh configure --
      #     the RmlUi FetchContent build shares this job's CMAKE_CXX_FLAGS cache entry,
      #     no separate wiring needed.
      #     It only ever surfaced as a cache-miss failure: jobs restoring a warm _deps
      #     cache below never actually recompile RmlUi and so never hit this, masking
      #     the bug until the next cache expiry/key change -- applied to every job that
      #     runs `cmake --build` (compiles RmlUi from source), not just the job that
      #     first exposed it via a brand-new cache key.
      # PT: Workaround para uma incompatibilidade conhecida libstdc++14 + clang que
      #     quebrou este job (e todo outro job abaixo que roda `cmake --build`) em
      #     2026-07-10 (run de CI 29112917463): o <bits/atomic_wait.h> do libstdc++ usa a
      #     macro de número de syscall SYS_futex sem incluir <sys/syscall.h> ele mesmo --
      #     os próprios headers do gcc puxam esse header transitivamente em outro lugar,
      #     o driver do clang não. Um build do RmlUi do zero com clang++
      #     (FreeTypeInterface.cpp inclui <atomic>) contra o libstdc++14 do Ubuntu então
      #     falha com "use of undeclared identifier 'SYS_futex'". `-include
      #     sys/syscall.h` força toda unidade de tradução a ver a declaração primeiro --
      #     puramente aditivo, sem mudança de comportamento (NÃO desliga/substitui o
      #     caminho de código do futex como -D_GLIBCXX_HAVE_LINUX_FUTEX=0 faria; só supre
      #     a declaração faltante para uma macro que o libstdc++ já usa
      #     incondicionalmente).
      #     É uma env var CXXFLAGS (não -DCMAKE_CXX_FLAGS na linha de comando do cmake)
      #     para a população de cache inicial do CMake pegar em TODO configure novo -- o
      #     build FetchContent do RmlUi compartilha esta mesma entrada de cache
      #     CMAKE_CXX_FLAGS deste job, sem fiação separada necessária.
      #     Só apareceu como falha de cache-miss: jobs restaurando um cache _deps quente
      #     abaixo nunca recompilam o RmlUi de fato e por isso nunca batem nisso,
      #     mascarando o bug até a próxima expiração/mudança de chave de cache --
      #     aplicado a todo job que roda `cmake --build` (compila o RmlUi do fonte), não
      #     só o job que expôs primeiro via uma chave de cache zero-nova.
      CXXFLAGS: "-include sys/syscall.h"
    strategy:
      # EN: Run both configs even if one fails -- independent build configurations.
      # PT: Rodar ambas as configs mesmo se uma falhar -- configuracoes de build independentes.
      fail-fast: false
      matrix:
        # EN: ON  = full build (App + UiLayer + GLFW backend); runs 18 tests.
        #     OFF = embed-only (UiLayer only, no GLFW in lib); runs 8 embed tests.
        #           GLFW is still needed as a test-only dep (GL context fixture).
        # PT: ON  = build completo (App + UiLayer + backend GLFW); roda 18 testes.
        #     OFF = embed-only (so UiLayer, sem GLFW na lib); roda 8 testes embed.
        #           GLFW ainda e necessario como dep so-de-teste (fixture de contexto GL).
        backend: [ON, OFF]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # EN: Cache the FetchContent clone of RmlUi. Each config uses its own build dir
      #     (build-ON / build-OFF) so cache paths and keys are separate per backend.
      #     Key includes 'glfw<backend>' to avoid cross-contamination between runs.
      # PT: Cache do clone FetchContent do RmlUi. Cada config usa seu proprio build dir
      #     (build-ON / build-OFF) por isso paths e chaves de cache sao separados.
      #     Chave inclui 'glfw<backend>' para evitar contaminacao cruzada entre runs.
      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build-${{ matrix.backend }}/_deps
          key: rmlui-${{ runner.os }}-glfw${{ matrix.backend }}-${{ hashFiles('glintfx/CMakeLists.txt') }}

      # EN: Install system build and runtime dependencies.
      #     clang: README.md declares "Compiler: clang" -- build-and-test must actually
      #     build the lib with clang, not just lint it (lint-and-scan already runs
      #     clang-tidy but never compiles the lib itself with clang).
      #     libglfw3-dev: installed for BOTH configs -- in GLFW=OFF mode the embed tests
      #     create a hidden GLFW window as a test-only GL context fixture; the library
      #     itself does not link GLFW in that config.
      #     libgl1-mesa-dri: llvmpipe (Mesa software GL renderer required by Xvfb).
      #     libxkbcommon-dev: GLFW keyboard-layout header (QW-XKB, parity with
      #     .forgejo/workflows/ci.yml -- the Codeberg runner's minimal container needed it
      #     explicit since ubuntu-latest's preinstalled stack silently covered the same
      #     dependency here; adding it is a defensive no-op today, closes the drift).
      # PT: Instala dependencias de build e runtime do sistema.
      #     clang: o README.md declara "Compiler: clang" -- o build-and-test precisa
      #     de fato buildar a lib com clang, nao so lintar (lint-and-scan ja roda
      #     clang-tidy mas nunca compila a lib em si com clang).
      #     libglfw3-dev: instalado em AMBAS as configs -- no modo GLFW=OFF os testes embed
      #     criam uma janela GLFW oculta como fixture de contexto GL so-de-teste; a biblioteca
      #     em si nao linka GLFW nessa config.
      #     libgl1-mesa-dri: llvmpipe (renderer software GL do Mesa necessario pelo Xvfb).
      #     libxkbcommon-dev: header de layout de teclado do GLFW (QW-XKB, paridade com
      #     .forgejo/workflows/ci.yml -- o container minimo do runner Codeberg precisava
      #     dele explicito porque a stack pre-instalada do ubuntu-latest ja cobria a mesma
      #     dependencia aqui; adiciona-lo e um no-op defensivo hoje, fecha o desvio).
      - name: install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake clang \
            libglfw3-dev libfreetype-dev \
            libgl1-mesa-dev libgl1-mesa-dri libxkbcommon-dev \
            xvfb

      # EN: Configure with the matrix backend flag. Demos OFF -- the showcase requires the
      #     GLFW App and is skipped automatically when GLINTFX_BACKEND_GLFW=OFF anyway.
      #     CMAKE_C_COMPILER/CMAKE_CXX_COMPILER pinned to clang/clang++ -- aligns the
      #     build with README.md's declared toolchain (was silently defaulting to g++).
      # PT: Configura com a flag de backend da matrix. Demos OFF -- o showcase requer o
      #     App GLFW e e pulado automaticamente com GLINTFX_BACKEND_GLFW=OFF de qualquer forma.
      #     CMAKE_C_COMPILER/CMAKE_CXX_COMPILER fixados em clang/clang++ -- alinha o
      #     build ao toolchain declarado no README.md (estava caindo em g++ em silencio).
      - name: configure
        run: |
          cmake -S glintfx -B glintfx/build-${{ matrix.backend }} \
            -DGLINTFX_BUILD_TESTS=ON \
            -DGLINTFX_BUILD_DEMOS=OFF \
            -DGLINTFX_BACKEND_GLFW=${{ matrix.backend }} \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: build
        run: cmake --build glintfx/build-${{ matrix.backend }} -j$(nproc)

      # EN: Run the test suite for this config under Xvfb (Mesa llvmpipe).
      #     GLFW=ON  runs 18 tests (10 GLFW-backend + 8 embed).
      #     GLFW=OFF runs  8 tests (8 embed only; GLFW/App tests excluded by CMake).
      #     run_xvfb.cmake calls xvfb-run -a per test; outer -a sets DISPLAY for ctest.
      # PT: Roda a suite de testes para esta config sob Xvfb (Mesa llvmpipe).
      #     GLFW=ON  roda 18 testes (10 backend GLFW + 8 embed).
      #     GLFW=OFF roda  8 testes (8 embed apenas; testes GLFW/App excluidos pelo CMake).
      #     run_xvfb.cmake chama xvfb-run -a por teste; o -a externo define DISPLAY para o ctest.
      - name: test
        run: xvfb-run -a ctest --test-dir glintfx/build-${{ matrix.backend }} --output-on-failure

  # EN: build-and-test-fonteng -- L1.20-FONTFLIP. Regression gate for glintfx's own SOV-SFNT/
  #     SOV-RAST font engine (L1.19-FONTENG, FT-F3), built behind GLINTFX_OWN_FONT_ENGINE=ON.
  #     That option defaults OFF and was previously NEVER exercised by CI -- the
  #     fonteng_own_embed_sanity test (gated behind the option) only ran ad hoc, locally. This
  #     job mirrors build-and-test's 2-config backend matrix (GLFW=ON / GLFW=OFF, the embed-only
  #     mode GusWorld actually consumes) with GLINTFX_OWN_FONT_ENGINE=ON added on top, so both
  #     fonteng_own_sanity (unconditional, engine-agnostic oracle) and fonteng_own_embed_sanity
  #     (gated behind the option, UiLayer-path regression test, review IMPORTANT #1) actually run
  #     and are checked on every push/PR, not just when a human remembers to flip the flag by
  #     hand. Independent build dir + cache key (glintfx/build-fonteng-<backend>, key suffix
  #     "fonteng") from build-and-test's own build-<backend> dirs -- both jobs FetchContent the
  #     SAME pinned RmlUi commit (GLINTFX_OWN_FONT_ENGINE does not touch the RmlUi
  #     FetchContent_Declare call at all, only adds glintfx's own sources on top), so this job's
  #     cache warms on its own runs the exact same way build-and-test's does (no scratch refetch
  #     after the first run) rather than risking a same-key/different-path collision between two
  #     independently-scheduled matrix jobs. Requires no consumer FetchContent workaround: the
  #     option's FATAL_ERROR guard (glintfx/CMakeLists.txt) only requires Layer 0's src/sfnt.c,
  #     src/raster.c, include/core/{sfnt,raster}.h to be siblings of glintfx/ -- true for every
  #     checkout of this monorepo, CI included.
  # PT: build-and-test-fonteng -- L1.20-FONTFLIP. Gate de regressão para o motor de fonte
  #     próprio SOV-SFNT/SOV-RAST do glintfx (L1.19-FONTENG, FT-F3), buildado atrás de
  #     GLINTFX_OWN_FONT_ENGINE=ON. Essa option é OFF por padrão e antes NUNCA era exercitada
  #     pelo CI -- o teste fonteng_own_embed_sanity (bloqueado atrás da option) só rodava ad hoc,
  #     localmente. Este job espelha a matrix de 2 configs de backend do build-and-test (GLFW=ON
  #     / GLFW=OFF, o modo embed-only que o GusWorld de fato consome) somando
  #     GLINTFX_OWN_FONT_ENGINE=ON por cima, para que tanto fonteng_own_sanity (incondicional,
  #     oráculo agnóstico de motor) quanto fonteng_own_embed_sanity (bloqueado atrás da option,
  #     teste de regressão do caminho UiLayer, IMPORTANTE #1 do review) de fato rodem e sejam
  #     checados em todo push/PR, não só quando um humano lembra de virar a flag na mão. Build
  #     dir + chave de cache independentes (glintfx/build-fonteng-<backend>, sufixo "fonteng" na
  #     chave) dos próprios dirs build-<backend> do build-and-test -- ambos os jobs fazem
  #     FetchContent do MESMO commit pinado do RmlUi (GLINTFX_OWN_FONT_ENGINE não toca a chamada
  #     FetchContent_Declare do RmlUi, só adiciona sources próprios do glintfx por cima), então o
  #     cache deste job esquenta nas próprias execuções do mesmo jeito que o do build-and-test
  #     (sem refetch do zero após a 1ª execução) em vez de arriscar colisão de mesma-chave/
  #     path-diferente entre dois jobs de matrix agendados independentemente. Não exige nenhum
  #     workaround de FetchContent do consumidor: o guard FATAL_ERROR da option
  #     (glintfx/CMakeLists.txt) só exige que src/sfnt.c, src/raster.c,
  #     include/core/{sfnt,raster}.h da Camada 0 sejam irmãos de glintfx/ -- verdade em todo
  #     checkout deste monorepo, CI incluído.
  build-and-test-fonteng:
    name: build & test (own font engine, ubuntu-latest / GLFW=${{ matrix.backend }})
    runs-on: ubuntu-latest
    env:
      # EN: SYS_futex / libstdc++14+clang RmlUi-from-scratch workaround -- see
      #     build-and-test job's own `env:` comment above for the full rationale.
      # PT: Workaround SYS_futex / libstdc++14+clang para o RmlUi buildado do zero --
      #     ver o comentário `env:` do próprio job build-and-test acima para a
      #     racional completa.
      CXXFLAGS: "-include sys/syscall.h"
    strategy:
      fail-fast: false
      matrix:
        backend: [ON, OFF]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build-fonteng-${{ matrix.backend }}/_deps
          key: rmlui-${{ runner.os }}-fonteng-glfw${{ matrix.backend }}-${{ hashFiles('glintfx/CMakeLists.txt') }}

      # EN: Same deps as build-and-test -- GLINTFX_OWN_FONT_ENGINE compiles Layer 0's C sources
      #     directly (extern "C") into the glintfx target, no new system dep beyond what
      #     build-and-test already installs.
      # PT: Mesmas deps do build-and-test -- GLINTFX_OWN_FONT_ENGINE compila os sources C da
      #     Camada 0 diretamente (extern "C") no alvo glintfx, sem nenhuma dep de sistema nova
      #     além do que o build-and-test já instala.
      - name: install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake clang \
            libglfw3-dev libfreetype-dev \
            libgl1-mesa-dev libgl1-mesa-dri libxkbcommon-dev \
            xvfb

      - name: configure
        run: |
          cmake -S glintfx -B glintfx/build-fonteng-${{ matrix.backend }} \
            -DGLINTFX_BUILD_TESTS=ON \
            -DGLINTFX_BUILD_DEMOS=OFF \
            -DGLINTFX_BACKEND_GLFW=${{ matrix.backend }} \
            -DGLINTFX_OWN_FONT_ENGINE=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: build
        run: cmake --build glintfx/build-fonteng-${{ matrix.backend }} -j$(nproc)

      - name: test
        run: xvfb-run -a ctest --test-dir glintfx/build-fonteng-${{ matrix.backend }} --output-on-failure

  # EN: lint-and-scan -- 3 CI-now, sempre-verde gates (TESTES.md "Camada 1", TODO.md
  #     LW-TST). Independent of build-and-test (no matrix, no ctest); runs in parallel.
  #     Tool choice:
  #       - clang-tidy + cppcheck (TST-L1-STATIC, part 1/2): both ship in ubuntu-latest's
  #         default toolchain, zero extra install.
  #       - tools/check_encapsulation.sh (TST-L1-STATIC, part 2/2): the encapsulation
  #         gate -- grep on `#include` DIRECTIVES in glintfx/include/glintfx/*.hpp,
  #         not on raw substrings, so the GLINTFX_BACKEND_GLFW macro does not false-
  #         positive (see script header + CLAUDE.md/AGENTS.md "Gotchas críticos").
  #       - gitleaks (TST-L1-SECRETS): scans the full git history (--source .), not
  #         just the working tree -- catches a secret that was committed then removed.
  #         Installed from the pinned upstream release tarball (not curl|sh) so the
  #         binary is reproducible and doesn't depend on running arbitrary shell code
  #         fetched at CI time.
  #       - grype (TST-L1-DEPS): scans the repo tree (`grype dir:.`) for known CVEs in
  #         anything syft's catalogers recognize. Also from a pinned release tarball.
  #         Coverage caveat: syft/grype have NO cataloger for vendorized, header-only
  #         C++ libraries dropped in-tree (glintfx/third_party/{stb,gl3w}) or for
  #         FetchContent-fetched sources (RmlUi) -- there is no manifest/lockfile for
  #         them to key off. This gate is real but narrow; the wider "is our pinned
  #         RmlUi/stb_image/gl3w version behind a known advisory" question is a
  #         **manual** audit (TODO.md AUD-L1-SUPPLY consumes this gate's output), not
  #         something automatable with today's SCA tooling for vendored C headers.
  # PT: lint-and-scan -- 3 gates CI-now, sempre-verde (TESTES.md "Camada 1", TODO.md
  #     LW-TST). Independente do build-and-test (sem matrix, sem ctest); roda em
  #     paralelo. Escolha de ferramenta:
  #       - clang-tidy + cppcheck (TST-L1-STATIC, parte 1/2): já vêm no toolchain
  #         default do ubuntu-latest, zero instalação extra.
  #       - tools/check_encapsulation.sh (TST-L1-STATIC, parte 2/2): o gate de
  #         encapsulamento -- grep em DIRETIVAS `#include` nos headers públicos
  #         (glintfx/include/glintfx/*.hpp), não em substring crua, para a macro
  #         GLINTFX_BACKEND_GLFW não dar falso positivo (ver cabeçalho do script +
  #         CLAUDE.md/AGENTS.md "Gotchas críticos").
  #       - gitleaks (TST-L1-SECRETS): escaneia o histórico git inteiro (--source .),
  #         não só a working tree -- pega segredo que foi commitado e depois removido.
  #         Instalado a partir do tarball de release fixado (não curl|sh), para o
  #         binário ser reprodutível e não depender de rodar shell arbitrário buscado
  #         em tempo de CI.
  #       - grype (TST-L1-DEPS): escaneia a árvore do repo (`grype dir:.`) por CVE
  #         conhecido em tudo que os catalogers do syft reconhecem. Também via tarball
  #         de release fixado. Ressalva de cobertura: syft/grype NÃO têm cataloger para
  #         libs C++ header-only vendorizadas em árvore (glintfx/third_party/{stb,gl3w})
  #         nem para fontes fetchadas via FetchContent (RmlUi) -- não há manifesto/
  #         lockfile pra eles se guiarem. Este gate é real mas estreito; a pergunta mais
  #         ampla "nossa versão pinada de RmlUi/stb_image/gl3w está atrás de algum
  #         advisory conhecido" é auditoria **manual** (TODO.md AUD-L1-SUPPLY consome a
  #         saída deste gate), não algo automatizável com o tooling de SCA de hoje para
  #         headers C++ vendorizados.
  lint-and-scan:
    name: lint & scan (ubuntu-latest)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.0"
      GRYPE_VERSION: "0.112.0"
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # EN: full history for gitleaks. PT: historico completo para o gitleaks.

      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build-lint/_deps
          key: rmlui-${{ runner.os }}-lint-${{ hashFiles('glintfx/CMakeLists.txt') }}

      - name: install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake g++ clang-tidy cppcheck \
            libglfw3-dev libfreetype-dev \
            libgl1-mesa-dev libgl1-mesa-dri libxkbcommon-dev

      # EN: Configure-only (no `cmake --build`): compile_commands.json and the
      #     generated config.hpp are both produced at configure time; clang-tidy and
      #     cppcheck compile each translation unit themselves and don't need the
      #     built .o/.a artifacts. Saves the full RmlUi build time on this job.
      # PT: So configure (sem `cmake --build`): compile_commands.json e o config.hpp
      #     gerado saem no configure; clang-tidy e cppcheck compilam cada unidade de
      #     traducao por conta propria e nao precisam dos artefatos .o/.a buildados.
      #     Economiza o tempo do build completo do RmlUi neste job.
      - name: configure (compile_commands.json only)
        run: |
          cmake -S glintfx -B glintfx/build-lint \
            -DGLINTFX_BUILD_TESTS=ON \
            -DGLINTFX_BUILD_DEMOS=OFF \
            -DGLINTFX_BACKEND_GLFW=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # EN: TST-L1-STATIC (1/3) -- encapsulation gate. Fails hard on any third-party
      #     #include in the public headers.
      # PT: TST-L1-STATIC (1/3) -- gate de encapsulamento. Falha duro em qualquer
      #     #include de terceiro nos headers publicos.
      - name: TST-L1-STATIC -- encapsulation gate
        run: ./tools/check_encapsulation.sh glintfx/include/glintfx

      # EN: ADR-0015 phase A0 -- configure-only smoke check for the two named
      #     CMakePresets.json compositions (glintfx/CMakePresets.json, "full" and
      #     "embed-only"). Cheap canary: catches the presets file drifting out of
      #     sync with the GLINTFX_MODULE_* flag family without paying for a second
      #     full build+test pass (that coverage already exists via build-and-test's
      #     GLFW=ON/OFF matrix, which this does NOT duplicate). NOT a replacement
      #     for per-atom isolated builds -- see ADR-0015 (d)(5) ("presets plus each
      #     atom built alone, NOT the 2^N combination matrix"): image/text/ui/fx
      #     don't have a real OFF path yet (A0 forces them ON, see CMakeLists.txt),
      #     so there is nothing to isolate-build for those atoms until their own
      #     phase lands; window is already exercised alone via the existing
      #     GLFW=OFF leg below. Directories removed right after so this cheap step
      #     doesn't leave a second _deps/RmlUi checkout sitting in the runner's
      #     workspace for no reason.
      # PT: ADR-0015 fase A0 -- checagem canário só-configure para as duas
      #     composições nomeadas do CMakePresets.json (glintfx/CMakePresets.json,
      #     "full" e "embed-only"). Canário barato: pega o arquivo de presets
      #     desviando da família de flags GLINTFX_MODULE_* sem pagar por uma
      #     segunda passada de build+teste completa (essa cobertura já existe via
      #     a matrix GLFW=ON/OFF do build-and-test, que isto NÃO duplica). NÃO é
      #     substituto de builds isolados por átomo -- ver ADR-0015 (d)(5)
      #     ("presets mais cada átomo buildado sozinho, NÃO a matriz combinatória
      #     2^N"): image/text/ui/fx ainda não têm um caminho OFF real (o A0 os
      #     força ON, ver CMakeLists.txt), então não há nada pra isolar-buildar
      #     desses átomos até a fase própria deles aterrissar; window já é
      #     exercitado sozinho via a perna GLFW=OFF existente abaixo. Diretórios
      #     removidos logo em seguida para que este passo barato não deixe um
      #     segundo checkout de _deps/RmlUi parado no workspace do runner à toa.
      - name: ADR-0015 A0 -- CMakePresets.json smoke (configure-only, full + embed-only)
        run: |
          cmake --preset full -S glintfx -DGLINTFX_BUILD_TESTS=OFF -DGLINTFX_BUILD_DEMOS=OFF
          cmake --preset embed-only -S glintfx -DGLINTFX_BUILD_TESTS=OFF -DGLINTFX_BUILD_DEMOS=OFF
          rm -rf glintfx/build-full glintfx/build-embed-only

      # EN: TST-L1-STATIC (2/3) -- clang-tidy. Checks and the WarningsAsErrors policy
      #     live in glintfx/.clang-tidy (only clang-analyzer-* fails the build today;
      #     modernize-*/cppcoreguidelines-* are reported, not gated -- see that file's
      #     header comment for the sempre-verde rationale).
      #     Recursive glob (`shopt -s globstar` + `src/**/*.cpp`) instead of the flat
      #     `src/*.cpp` used before FX-CARVE-1 -- the flat glob silently skipped
      #     `glintfx/src/fx/*.cpp` (effects_gl3.cpp, the new fx OBJECT-lib TU carved
      #     out of render_gl3.cpp), a lint-coverage gap found during A3-AUDIO/
      #     FX-CARVE-1 CI integration (S3). `bash -c` wraps the shell so `globstar`
      #     takes effect (the workflow's default `run:` shell already is bash on
      #     ubuntu-latest, but the option must be set explicitly in-line).
      # PT: TST-L1-STATIC (2/3) -- clang-tidy. Checks e a politica de WarningsAsErrors
      #     vivem em glintfx/.clang-tidy (so clang-analyzer-* falha o build hoje;
      #     modernize-*/cppcoreguidelines-* sao reportados, nao gateados -- ver o
      #     comentario de cabecalho daquele arquivo para o motivo do sempre-verde).
      #     Glob recursivo (`shopt -s globstar` + `src/**/*.cpp`) em vez do `src/*.cpp`
      #     plano usado antes do FX-CARVE-1 -- o glob plano pulava em silencio
      #     `glintfx/src/fx/*.cpp` (effects_gl3.cpp, a nova TU da OBJECT-lib fx
      #     recortada de render_gl3.cpp), um buraco de cobertura de lint achado durante
      #     a integracao de CI do A3-AUDIO/FX-CARVE-1 (S3). `bash -c` embrulha o shell
      #     para o `globstar` valer (o shell default do `run:` ja e bash no
      #     ubuntu-latest, mas a option precisa ser setada explicitamente in-line).
      - name: TST-L1-STATIC -- clang-tidy
        run: |
          shopt -s globstar
          clang-tidy -p glintfx/build-lint glintfx/src/**/*.cpp

      # EN: TST-L1-STATIC (3/3) -- cppcheck, restricted to our own src/ (--file-filter)
      #     with vendored/fetched code suppressed (third_party/, _deps/) -- those are
      #     not our authorship and out of scope for this gate. --file-filter is
      #     '*glintfx/src/*' (leading bare '*', NOT '*/glintfx/src/*'): with a RELATIVE
      #     --project path (as used here), cppcheck matches file entries as plain
      #     relative paths with no leading '/' (e.g. "glintfx/src/foo.cpp"), so a filter
      #     requiring a literal '/' right before "glintfx" never matches -- reproduced
      #     and confirmed locally.
      # PT: TST-L1-STATIC (3/3) -- cppcheck, restrito ao nosso proprio src/
      #     (--file-filter) com codigo vendorizado/fetchado suprimido (third_party/,
      #     _deps/) -- fora da nossa autoria e fora do escopo deste gate. --file-filter
      #     e '*glintfx/src/*' (asterisco nu no inicio, NAO '*/glintfx/src/*'): com
      #     --project RELATIVO (como aqui), o cppcheck casa as entradas de arquivo como
      #     caminho relativo puro sem '/' no inicio (ex.: "glintfx/src/foo.cpp"), entao
      #     um filtro que exige um '/' literal antes de "glintfx" nunca casa --
      #     reproduzido e confirmado localmente.
      - name: TST-L1-STATIC -- cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --std=c++20 --language=c++ --platform=unix64 \
            --project=glintfx/build-lint/compile_commands.json \
            --file-filter='*glintfx/src/*' \
            --suppress=missingIncludeSystem \
            --suppress='*:*/third_party/*' \
            --suppress='*:*/_deps/*' \
            --error-exitcode=1

      # EN: Installed into $HOME/.local/bin (added to PATH via GITHUB_PATH) instead of
      #     /usr/local/bin -- avoids a sudo dependency on the non-root GH Actions
      #     runner user, and the exact same steps work unmodified on the Forgejo
      #     workflow's root-inside-container runner.
      # PT: Instalado em $HOME/.local/bin (adicionado ao PATH via GITHUB_PATH) em vez
      #     de /usr/local/bin -- evita depender de sudo no usuario nao-root do runner
      #     do GH Actions, e os mesmos passos funcionam sem alteracao no runner
      #     root-dentro-do-container do workflow Forgejo.
      - name: install gitleaks
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C "$HOME/.local/bin" gitleaks
          "$HOME/.local/bin/gitleaks" version

      # EN: TST-L1-SECRETS -- history + working tree (gitleaks detect's default scope
      #     with a git source is the full history).
      # PT: TST-L1-SECRETS -- historico + working tree (o escopo default do gitleaks
      #     detect com uma fonte git e o historico inteiro).
      - name: TST-L1-SECRETS -- gitleaks
        run: gitleaks detect --source . --redact -v

      - name: install grype
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -sSfL -o /tmp/grype.tar.gz \
            "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/grype.tar.gz -C "$HOME/.local/bin" grype
          "$HOME/.local/bin/grype" version

      # EN: TST-L1-DEPS -- repo-tree scan. --fail-on high: block on high/critical CVEs,
      #     not on low/medium noise (an alert must be actionable -- see coverage
      #     caveat in the job header comment).
      # PT: TST-L1-DEPS -- scan da arvore do repo. --fail-on high: bloqueia em CVE
      #     high/critical, nao em ruido low/medium (um alerta precisa ser acionavel --
      #     ver a ressalva de cobertura no comentario de cabecalho do job).
      - name: TST-L1-DEPS -- grype
        run: grype dir:. --fail-on high

  # EN: coverage -- L1.18-COVCI / TST-L1-COV. Self-hosted code coverage (líder's
  #     2026-07-04 decision: llvm-cov, NOT Codecov or any third-party uploader -- zero
  #     data leaves this runner). This job is a THIN WRAPPER around
  #     tools/coverage_report.sh (the local-first "gêmeo local" the CI calls, per
  #     CLAUDE.md global preference) -- the script does configure+build (GLINTFX_COVERAGE=ON,
  #     Clang-only, GLINTFX_BUILD_DEMOS=OFF -- see glintfx/CMakeLists.txt), runs the
  #     GLFW=ON suite under Xvfb with LLVM_PROFILE_FILE set, merges .profraw ->
  #     .profdata, and generates both the HTML report and the machine-readable summary.
  #     --floor 75: gate, not report-only. 75 = (83.8% measured locally 2026-07-10,
  #     rounded DOWN to the nearest multiple of 5 = 80) - 5pp headroom, so ordinary
  #     coverage fluctuation from new code landing between floor recalibrations does not
  #     flip this gate red on its own (see TESTES.md TST-L1-COV for the recalibration
  #     policy). This job intentionally does NOT pass --update-badge: the committed
  #     glintfx/coverage-badge.json is a LOCAL/human artifact (`tools/coverage_report.sh
  #     --update-badge`, committed by a person) -- CI only validates the % against the
  #     floor and uploads the HTML report; it never writes/commits/pushes the badge JSON
  #     back to the repo (TODO.md L1.18-COVCI, "CI NÃO commita/pusha o JSON do badge").
  #     Independent of build-and-test/lint-and-scan (own build-cov dir, own cache key);
  #     runs in parallel.
  # PT: coverage -- L1.18-COVCI / TST-L1-COV. Cobertura de código self-hosted (decisão
  #     do líder de 2026-07-04: llvm-cov, NÃO Codecov nem nenhum uploader de terceiro --
  #     zero dado sai deste runner). Este job é um WRAPPER FINO em torno de
  #     tools/coverage_report.sh (o "gêmeo local" local-first que o CI chama, conforme
  #     preferência do CLAUDE.md global) -- o script faz configure+build
  #     (GLINTFX_COVERAGE=ON, só Clang, GLINTFX_BUILD_DEMOS=OFF -- ver
  #     glintfx/CMakeLists.txt), roda a suíte GLFW=ON sob Xvfb com LLVM_PROFILE_FILE
  #     definido, mescla .profraw -> .profdata, e gera tanto o relatório HTML quanto o
  #     resumo legível por máquina. --floor 75: gate, não só-relatório. 75 = (83.8%
  #     medido localmente em 2026-07-10, arredondado PRA BAIXO ao múltiplo de 5 mais
  #     próximo = 80) - 5pp de folga, para que a flutuação normal de cobertura de código
  #     novo pousando entre recalibrações do piso não vire este gate vermelho sozinha
  #     (ver TESTES.md TST-L1-COV para a política de recalibração). Este job
  #     deliberadamente NÃO passa --update-badge: o glintfx/coverage-badge.json
  #     commitado é um artefato LOCAL/humano (`tools/coverage_report.sh
  #     --update-badge`, commitado por uma pessoa) -- o CI só valida a % contra o piso e
  #     sobe o relatório HTML; nunca escreve/commita/pusha o JSON do badge de volta pro
  #     repo (TODO.md L1.18-COVCI, "CI NÃO commita/pusha o JSON do badge"). Independente
  #     de build-and-test/lint-and-scan (build-cov próprio, chave de cache própria);
  #     roda em paralelo.
  coverage:
    name: coverage (ubuntu-latest)
    runs-on: ubuntu-latest
    env:
      # EN: SYS_futex / libstdc++14+clang RmlUi-from-scratch workaround -- see
      #     build-and-test job's own `env:` comment above for the full rationale.
      #     tools/coverage_report.sh's `cmake -S ... -B ...` call does not pass
      #     -DCMAKE_CXX_FLAGS itself, so CMake's initial-cache population picks this
      #     env var up on every fresh configure -- no change to the script needed.
      # PT: Workaround SYS_futex / libstdc++14+clang para o RmlUi buildado do zero --
      #     ver o comentário `env:` do próprio job build-and-test acima para a
      #     racional completa. A chamada `cmake -S ... -B ...` de
      #     tools/coverage_report.sh não passa -DCMAKE_CXX_FLAGS por si só, então a
      #     população de cache inicial do CMake pega esta env var em todo configure
      #     novo -- nenhuma mudança no script necessária.
      CXXFLAGS: "-include sys/syscall.h"
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: cache rmlui (fetchcontent)
        uses: actions/cache@v4
        with:
          path: glintfx/build-cov/_deps
          key: rmlui-${{ runner.os }}-cov-${{ hashFiles('glintfx/CMakeLists.txt') }}

      # EN: llvm: ships llvm-cov/llvm-profdata (possibly version-suffixed, e.g.
      #     llvm-cov-18 -- tools/coverage_report.sh's resolve_llvm_tool() handles that).
      # PT: llvm: traz llvm-cov/llvm-profdata (possivelmente com sufixo de versão, ex.:
      #     llvm-cov-18 -- resolve_llvm_tool() em tools/coverage_report.sh lida com isso).
      - name: install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake clang llvm \
            libglfw3-dev libfreetype-dev \
            libgl1-mesa-dev libgl1-mesa-dri libxkbcommon-dev \
            xvfb

      # EN: tools/coverage_report.sh wraps its own ctest invocation in `xvfb-run -a`
      #     internally (matches every other ctest call in this repo's CI) -- no outer
      #     xvfb-run needed here.
      # PT: tools/coverage_report.sh já envolve sua própria invocação de ctest em
      #     `xvfb-run -a` internamente (casa com toda outra chamada de ctest neste CI
      #     do repo) -- nenhum xvfb-run externo necessário aqui.
      - name: coverage (build + test + report, floor gate)
        run: ./tools/coverage_report.sh --build-dir glintfx/build-cov --floor 75

      - name: upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: glintfx/build-cov/coverage-html
          retention-days: 30

  # EN: windows-msvc-build -- MSVC portability gate (AUDIO-F2 / GusWorld Windows CI regression,
  #     S3-CI). Configures + builds glintfx/CMakeLists.txt ITSELF (the same file every job above
  #     builds with clang on Linux) on windows-latest with MSVC (cl.exe), no toolchain override --
  #     this is the gap windows-atoms.yml's own job never closes: that job builds a STANDALONE
  #     harness (tests/win-atoms/CMakeLists.txt) compiling only 4 pure-atom .cpp/.c files
  #     directly, never invoking THIS CMakeLists.txt at all. That gap let an MSVC-hostile flag
  #     (-Wextra, a GCC/Clang spelling cl.exe rejects with "D8021: invalid numeric argument
  #     '/Wextra'", applied unconditionally to 9 target_compile_options() call sites since
  #     ~v0.16.0) ship unnoticed until the GusWorld consumer's own Windows CI -- a real
  #     add_subdirectory/FetchContent build of this exact file -- caught it in practice. See the
  #     MSVC-guard comment next to glintfx_core's target_compile_options() call (search this
  #     file's history / glintfx/CMakeLists.txt for "AUDIO-F2 / gusworld Windows CI regression")
  #     for the fix this job verifies.
  #     Dependency scope, DEGRADED from a full GLFW+FreeType+RmlUi build on purpose (this exact
  #     trade-off was flagged as acceptable when this job was authored -- see PT below for the
  #     honest boundary):
  #       - FreeType: installed via vcpkg (freetype:x64-windows), pinned to vcpkg tag 2026.06.24
  #         for reproducibility (not the runner's preinstalled vcpkg, whose path/version drifted
  #         across runner-image generations -- see actions/runner-images#9269/#6146). Unavoidable:
  #         find_package(Freetype REQUIRED) in glintfx/CMakeLists.txt is unconditional, not gated
  #         by any GLINTFX_MODULE_* flag, so configure fails without it no matter which target is
  #         built afterwards.
  #       - GLFW: NOT installed. GLINTFX_BACKEND_GLFW=OFF here, so glintfx_window (window_glfw.cpp)
  #         and Backends/RmlUi_Platform_GLFW.cpp are skipped -- these are the ONE target_compile_
  #         options() site (glintfx_window's) this job does NOT exercise on MSVC. Chosen to avoid
  #         a second from-source vcpkg port (glfw3) and a second real dependency surface, keeping
  #         this job's cost/flakiness close to windows-atoms.yml's own "pragmatic gate" philosophy
  #         (see that file's header) while still catching the flag-portability regression class on
  #         6 of glintfx's other 9 compiled targets (core/image/text/i18n/fx/audio -- gamepad is
  #         force-disabled on non-Linux by glintfx/CMakeLists.txt itself, so it was never going to
  #         run here regardless). OpenGL needs no vcpkg install -- ships with the Windows SDK/MSVC
  #         toolchain already on the runner image, and RmlUi_Renderer_GL3.cpp (the GL3 renderer)
  #         compiles unconditionally as part of glintfx_fx REGARDLESS of GLINTFX_BACKEND_GLFW (see
  #         `_rml_backends` usage in glintfx/CMakeLists.txt) -- only the GLFW-specific glue is
  #         skipped, not the actual OpenGL-facing renderer code.
  #     Builds ONLY the `glintfx` aggregate target (GLINTFX_BUILD_TESTS=OFF, GLINTFX_BUILD_DEMOS=
  #     OFF) -- this job's whole purpose is reproducing the LIBRARY build GusWorld hit, not
  #     running the Linux-only Xvfb test suite a second time under a different compiler.
  #     UNVERIFIED AT AUTHORING TIME: no Windows/MSVC toolchain was available to dry-run this job
  #     before it was committed -- its first real signal is its own first CI run. If vcpkg
  #     (freetype from source) proves flaky in practice, the response is narrowing scope further
  #     (e.g. `continue-on-error: true` while investigating) rather than dropping the gate --
  #     mirrors windows-atoms.yml's own "if it demonstrates flakiness in practice, the líder
  #     decides whether to downgrade it to informational" precedent.
  # PT: windows-msvc-build -- gate de portabilidade MSVC (regressão de CI Windows do AUDIO-F2 /
  #     GusWorld, S3-CI). Configura + builda o PRÓPRIO glintfx/CMakeLists.txt (o mesmo arquivo que
  #     todo job acima builda com clang no Linux) no windows-latest com MSVC (cl.exe), sem
  #     override de toolchain -- esta é a lacuna que o próprio job do windows-atoms.yml nunca
  #     fecha: aquele job builda um harness STANDALONE (tests/win-atoms/CMakeLists.txt) que
  #     compila só 4 arquivos .cpp/.c de átomo puro diretamente, nunca invocando ESTE
  #     CMakeLists.txt. Essa lacuna deixou uma flag hostil ao MSVC (-Wextra, grafia GCC/Clang que
  #     o cl.exe rejeita com "D8021: invalid numeric argument '/Wextra'", aplicada
  #     incondicionalmente em 9 pontos de target_compile_options() desde ~v0.16.0) ser lançada sem
  #     ser notada até o próprio CI Windows do consumidor GusWorld -- um build real via
  #     add_subdirectory/FetchContent deste exato arquivo -- pegá-la na prática. Ver o comentário
  #     de guarda MSVC ao lado do target_compile_options() do glintfx_core (buscar neste arquivo/
  #     em glintfx/CMakeLists.txt por "AUDIO-F2 / gusworld Windows CI regression") para o fix que
  #     este job verifica.
  #     Escopo de dependência, DEGRADADO de propósito a partir de um build completo GLFW+FreeType+
  #     RmlUi (este exato trade-off foi sinalizado como aceitável quando este job foi autorado --
  #     ver a fronteira honesta abaixo):
  #       - FreeType: instalado via vcpkg (freetype:x64-windows), pinado na tag 2026.06.24 do
  #         vcpkg para reprodutibilidade (não o vcpkg pré-instalado do runner, cujo path/versão
  #         andou mudando entre gerações de imagem de runner -- ver actions/runner-images#9269/
  #         #6146). Inevitável: find_package(Freetype REQUIRED) no glintfx/CMakeLists.txt é
  #         incondicional, não gateado por nenhuma flag GLINTFX_MODULE_*, então o configure falha
  #         sem ele independente de qual alvo for buildado depois.
  #       - GLFW: NÃO instalado. GLINTFX_BACKEND_GLFW=OFF aqui, então o glintfx_window
  #         (window_glfw.cpp) e o Backends/RmlUi_Platform_GLFW.cpp são pulados -- este é o ÚNICO
  #         ponto de target_compile_options() (o do glintfx_window) que este job NÃO exercita no
  #         MSVC. Escolhido para evitar uma segunda porta vcpkg buildada do source (glfw3) e uma
  #         segunda superfície de dependência real, mantendo o custo/flakiness deste job perto da
  #         própria filosofia de "gate pragmático" do windows-atoms.yml (ver o cabeçalho daquele
  #         arquivo) e ainda assim pegando a classe de regressão de portabilidade de flag em 6 dos
  #         outros 9 alvos compilados da glintfx (core/image/text/i18n/fx/audio -- o gamepad é
  #         forçado OFF em não-Linux pelo próprio glintfx/CMakeLists.txt, então nunca ia rodar
  #         aqui de qualquer forma). OpenGL não precisa de instalação via vcpkg -- já vem com o
  #         Windows SDK/toolchain MSVC na imagem do runner, e o RmlUi_Renderer_GL3.cpp (o
  #         renderer GL3) compila incondicionalmente como parte do glintfx_fx INDEPENDENTE de
  #         GLINTFX_BACKEND_GLFW (ver o uso de `_rml_backends` no glintfx/CMakeLists.txt) -- só a
  #         cola específica do GLFW é pulada, não o código de renderer que fala com o OpenGL de
  #         verdade.
  #     Builda SÓ o alvo agregado `glintfx` (GLINTFX_BUILD_TESTS=OFF, GLINTFX_BUILD_DEMOS=OFF) --
  #     o propósito inteiro deste job é reproduzir o build da BIBLIOTECA que o GusWorld bateu, não
  #     rodar de novo a suíte de teste Linux-only sob Xvfb com outro compilador.
  #     NÃO VERIFICADO NO MOMENTO DA AUTORIA: nenhuma toolchain Windows/MSVC estava disponível
  #     para testar este job a seco antes de ser commitado -- o primeiro sinal real é a própria
  #     primeira execução de CI dele. Se o vcpkg (freetype do source) se mostrar flaky na
  #     prática, a resposta é estreitar o escopo mais (ex.: `continue-on-error: true` enquanto se
  #     investiga) em vez de derrubar o gate -- espelha o próprio precedente do windows-atoms.yml
  #     ("se demonstrar flakiness na prática, o líder decide rebaixar para informativo").
  windows-msvc-build:
    name: windows msvc build (windows-latest, glintfx/CMakeLists.txt)
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      # EN: Bootstrap our OWN pinned vcpkg checkout (C:\vcpkg-glintfx) instead of relying on the
      #     runner's preinstalled one -- its path/version has drifted across runner-image
      #     generations (actions/runner-images#9269, #6146), which would make this job's
      #     reproducibility depend on GitHub's runner-image rollout schedule instead of on a
      #     version this repo controls.
      # PT: Faz bootstrap do NOSSO PRÓPRIO checkout pinado do vcpkg (C:\vcpkg-glintfx) em vez de
      #     depender do pré-instalado no runner -- o path/versão dele andou mudando entre
      #     gerações de imagem de runner (actions/runner-images#9269, #6146), o que faria a
      #     reprodutibilidade deste job depender do cronograma de rollout de imagem do GitHub em
      #     vez de uma versão que este repo controla.
      - name: bootstrap vcpkg (pinned)
        run: |
          git clone --branch 2026.06.24 --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg-glintfx
          C:\vcpkg-glintfx\bootstrap-vcpkg.bat
        shell: pwsh

      # EN: Cache vcpkg's built packages + download cache -- freetype builds from source under
      #     vcpkg (no prebuilt binary cache configured here), which is the slow part of this job
      #     on a cache miss. Keyed on the pinned vcpkg tag + package/triplet so a vcpkg upgrade or
      #     port-list change invalidates it automatically instead of silently reusing a stale
      #     build.
      # PT: Cache dos pacotes buildados do vcpkg + cache de download -- o freetype builda do
      #     source sob o vcpkg (sem cache de binário prebuilt configurado aqui), que é a parte
      #     lenta deste job num cache miss. Chaveado na tag pinada do vcpkg + pacote/triplet para
      #     que um upgrade do vcpkg ou mudança na lista de ports invalide automaticamente em vez
      #     de reusar silenciosamente um build velho.
      - name: cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg-glintfx\installed
            C:\vcpkg-glintfx\downloads
          key: vcpkg-2026.06.24-x64-windows-freetype-${{ runner.os }}

      - name: vcpkg install (freetype)
        run: C:\vcpkg-glintfx\vcpkg.exe install freetype:x64-windows
        shell: pwsh

      # EN: GLINTFX_BACKEND_GLFW=OFF -- see this job's own header comment above for the honest
      #     boundary (glintfx_window/RmlUi_Platform_GLFW.cpp are the one target_compile_options()
      #     site NOT exercised by this job). GLINTFX_BUILD_TESTS/DEMOS=OFF -- this job builds only
      #     the library, not the test/demo targets (out of scope, see header comment).
      # PT: GLINTFX_BACKEND_GLFW=OFF -- ver o próprio comentário de cabeçalho deste job acima para
      #     a fronteira honesta (glintfx_window/RmlUi_Platform_GLFW.cpp são o único ponto de
      #     target_compile_options() NÃO exercitado por este job). GLINTFX_BUILD_TESTS/DEMOS=OFF
      #     -- este job builda só a biblioteca, não os alvos de teste/demo (fora de escopo, ver
      #     comentário de cabeçalho).
      - name: configure
        run: |
          cmake -S glintfx -B glintfx/build-msvc `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg-glintfx\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DGLINTFX_BACKEND_GLFW=OFF `
            -DGLINTFX_BUILD_TESTS=OFF `
            -DGLINTFX_BUILD_DEMOS=OFF `
            -DGLINTFX_BUILD_LINK_SMOKE=ON
        shell: pwsh

      - name: build (glintfx target only)
        run: cmake --build glintfx/build-msvc --config Release --target glintfx
        shell: pwsh

      # EN: glintfx_link_smoke (QW-MSVCLINK, PROG-1) -- builds and RUNS a minimal executable
      #     that LINKS against glintfx::glintfx. This is the step that actually closes the gap
      #     documented in this job's own header comment above: `cmake --build --target glintfx`
      #     alone only archives object files (lib.exe/ar), which never resolves symbols or
      #     PRIVATE usage requirements -- that is exactly how a bare `m` (Unix libm) leaking
      #     into glintfx_audio's target_link_libraries() shipped unnoticed until the GusWorld
      #     consumer's own Windows CI hit "LNK1181: cannot open input file 'm.lib'" linking a
      #     REAL executable. Do NOT simplify this step back to `--target glintfx` alone --
      #     doing so silently reopens this exact hole for the next Unix-only dependency that
      #     leaks into any glintfx module (also the natural place to extend link-smoke coverage
      #     when gamepad support lands on Windows -- see GLINTFX_MODULE_GAMEPAD's Linux-only
      #     comment in glintfx/CMakeLists.txt). See glintfx/tests/link_smoke.cpp and the
      #     GLINTFX_BUILD_LINK_SMOKE option block in glintfx/CMakeLists.txt for the full
      #     rationale.
      # PT: glintfx_link_smoke (QW-MSVCLINK, PROG-1) -- builda e RODA um executável mínimo que
      #     LINKA contra glintfx::glintfx. Este é o passo que fecha de fato a lacuna documentada
      #     no próprio comentário de cabeçalho deste job acima: `cmake --build --target glintfx`
      #     sozinho só arquiva arquivos-objeto (lib.exe/ar), o que nunca resolve símbolo nem
      #     usage requirement PRIVATE -- foi exatamente assim que um `m` cru (libm do Unix)
      #     vazando pro target_link_libraries() do glintfx_audio foi lançado sem ser notado até
      #     o próprio CI Windows do consumidor GusWorld bater em "LNK1181: cannot open input
      #     file 'm.lib'" ao linkar um executável DE VERDADE. NÃO simplifique este passo de
      #     volta pra só `--target glintfx` -- fazer isso reabre silenciosamente este exato
      #     buraco pra próxima dependência Unix-only que vazar em qualquer módulo da glintfx
      #     (também o lugar natural para estender a cobertura do link-smoke quando suporte a
      #     gamepad chegar no Windows -- ver o comentário Linux-only do GLINTFX_MODULE_GAMEPAD
      #     em glintfx/CMakeLists.txt). Ver glintfx/tests/link_smoke.cpp e o bloco da option
      #     GLINTFX_BUILD_LINK_SMOKE em glintfx/CMakeLists.txt para a racional completa.
      - name: build + run glintfx_link_smoke (consumer-style executable link)
        run: |
          cmake --build glintfx/build-msvc --config Release --target glintfx_link_smoke
          .\glintfx\build-msvc\Release\glintfx_link_smoke.exe
        shell: pwsh
